<!-- ecosystem.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生态 - BCBS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* ================= 纯科技蓝赛博风主题色 ================= */
        :root {
            --bg-color: #050B15;             /* 极深星空蓝背景 */
            --card-bg: rgba(8, 20, 48, 0.4); /* 半透明深蓝卡片 */
            --border-color: rgba(0, 136, 255, 0.15); /* 幽蓝边框 */
            
            --text-primary: #FFFFFF;         /* 纯白主文本 */
            --text-primary-soft: #E2F0FB;    /* 极浅冰白 */
            --text-secondary: #8AA9C9;       /* 低饱和灰蓝 */
            --text-dim: rgba(255, 255, 255, 0.45); /* 半透明白 */
            
            --cyan-glow: #00DDFF;            /* 电光青/亮蓝（核心高亮） */
            --cyan-dim: #0088FF;             /* 深蓝/暗光蓝 */
        }

        body { 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            overflow: hidden; 
            color: var(--text-primary); 
        }

        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            background: radial-gradient(circle at 50% 10%, #102040 0%, #050B15 100%); 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0, 136, 255, 0.1); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
        }

        /* ===== 统一流动性标准背景图 ===== */
        .app-container::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-image: url('https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/bg.png'); 
            background-size: cover; 
            background-position: center top; 
            background-repeat: no-repeat; 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
            opacity: 0.8;
            z-index: 0; 
            pointer-events: none; 
            border-radius: 20px; 
        }

        .scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            -webkit-overflow-scrolling: touch; 
            position: relative; 
            z-index: 1; /* 确保内容在背景图上 */
        }

        /* ================= Header ================= */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.5px; }
        .logo-area img { width: 24px; height: 24px; margin-right: 5px; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        
        .lang-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        
        .connect-btn { 
            background: transparent; 
            border: 1px solid rgba(0, 221, 255, 0.3); 
            color: var(--cyan-glow); 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 500; 
            cursor: pointer; 
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.05); 
            transition: all 0.3s; 
            white-space: nowrap; 
        }
        .connect-btn:hover { box-shadow: 0 0 25px rgba(0, 204, 255, 0.2); background: rgba(0, 204, 255, 0.05); }
        .connect-btn.connected { background: rgba(0, 204, 255, 0.1); border-color: var(--cyan-glow); color: var(--cyan-glow); }

        /* ================= 面板基础样式 ================= */
        .panel { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
            position: relative; 
            box-shadow: inset 0 0 30px rgba(0, 136, 255, 0.02); 
        }
        /* 科技蓝流光边框效果 */
        .panel::before { 
            content: ''; 
            position: absolute; 
            top: -1px; left: -1px; right: -1px; bottom: -1px; 
            border-radius: 16px; 
            padding: 1px; 
            background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--cyan-glow)); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; 
            mask-composite: exclude; 
            pointer-events: none; 
            opacity: 0.5;
        }

        /* 标题文字修复：纯白 */
        .page-title { 
            font-size: 24px; 
            text-align: center; 
            margin: 10px 0 20px; 
            color: var(--text-primary); 
            font-weight: 600; 
            letter-spacing: 1px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        .page-title img { width: 28px; height: 28px; object-fit: contain; }

        .btn-primary { 
            width: 100%; 
            background: linear-gradient(90deg, var(--cyan-dim), var(--cyan-glow)); 
            border: none; 
            border-radius: 8px; 
            padding: 12px; 
            font-weight: 600; 
            color: #050B15; 
            cursor: pointer; 
            box-shadow: 0 4px 20px rgba(0, 136, 255, 0.3); 
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0, 204, 255, 0.4); }

        /* ================= 生态科技卡片 ================= */
        .sci-fi-card { 
            background: rgba(0, 16, 40, 0.5); 
            border-radius: 16px; 
            padding: 10px 15px 10px 0; 
            border: 1px solid rgba(0, 136, 255, 0.15);
            backdrop-filter: blur(8px);
            position: relative; 
            display: flex; 
            align-items: center; 
            margin-bottom: 20px; 
            min-height: 113px; 
            transition: all 0.3s;
        }
        .sci-fi-card:hover { border-color: rgba(0, 204, 255, 0.4); box-shadow: 0 0 20px rgba(0, 136, 255, 0.05); }
        
        .sci-fi-card::before { 
            content: ''; 
            position: absolute; 
            top: -1px; left: -1px; right: -1px; bottom: -1px; 
            border-radius: 16px; 
            padding: 1px; 
            background: linear-gradient(135deg, var(--cyan-dim) 0%, transparent 60%, transparent 80%, var(--cyan-glow) 100%); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; 
            mask-composite: exclude; 
            pointer-events: none; 
            opacity: 0.7; 
        }

        .card-image-box { 
            flex: 0 0 110px; 
            height: 100px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            margin-left: 10px; 
        }
        
        /* ===== 图标缩小 20% 以及新增旋转光圈 ===== */
        .card-image-box img { 
            width: 64px; /* 原80px，缩小20% */
            height: 64px; 
            object-fit: contain; 
            filter: drop-shadow(0 0 10px rgba(0, 221, 255, 0.2));
            border-radius: 50%;
            position: relative;
            z-index: 2;
        }

        /* 科技感顺时针旋转光圈 */
        .card-image-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;  /* 比图片稍大，形成包裹感 */
            height: 80px;
            border-radius: 50%;
            z-index: 1;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                var(--cyan-glow) 30deg,
                transparent 60deg,
                var(--cyan-glow) 120deg,
                transparent 180deg,
                var(--cyan-glow) 240deg,
                transparent 300deg,
                transparent 360deg
            );
            /* 顺时针旋转动画，配合滤色效果发光 */
            animation: spinRing 3s linear infinite;
            -webkit-mask: radial-gradient(circle, transparent 58%, #000 60%);
            mask: radial-gradient(circle, transparent 58%, #000 60%);
            opacity: 0.8;
        }

        /* 旋转动画关键帧 */
        @keyframes spinRing {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .card-content { 
            flex: 1; 
            padding: 5px 15px 5px 10px; 
            display: flex; 
            flex-direction: column; 
        }
        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2px; 
        }
        .card-header h2 { 
            font-size: 18px; 
            font-weight: 500; 
            color: var(--text-primary); /* 标题改为纯白 */
            letter-spacing: 1px; 
        }
        .card-header .arrow { 
            color: var(--cyan-dim); 
            font-size: 20px; 
            font-weight: 300; 
            cursor: pointer; 
        }
        /* ✅ 修改：副标题在 6px 基础上再缩小四分之一 */
        .card-separator { 
            color: var(--text-secondary); 
            margin-bottom: 4px; 
            letter-spacing: 1px; 
            font-size: 12px;       /* 浏览器最小可读设置 12px */
            transform: scale(0.375); /* 0.375 * 12 = 4.5px (即6px缩小四分之一) */
            transform-origin: left center;
            display: inline-block;   /* 确保 transform 生效 */
        }
        .card-description { 
            font-size: 12px; 
            line-height: 1.5; 
            color: var(--text-primary-soft); 
            text-align: justify; 
        }

        /* ================= 底部导航栏 ================= */
        .bottom-nav { 
            flex-shrink: 0; 
            background: rgba(5, 11, 21, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 136, 255, 0.15); 
            border-radius: 20px; 
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.8); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            margin: 0 15px 15px 15px; 
            position: relative; 
            z-index: 10;
        }
        .bottom-nav::before { 
            content: ''; 
            position: absolute; 
            top: -1px; left: -1px; right: -1px; bottom: -1px; 
            border-radius: 20px; 
            padding: 1px; 
            background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--cyan-glow)); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; 
            mask-composite: exclude; 
            pointer-events: none; 
            opacity: 0.5;
        }
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--text-secondary); 
            font-size: 11px; 
            gap: 4px; 
            cursor: pointer; 
            padding: 5px 10px; 
            transition: all 0.3s ease; 
            text-decoration: none; 
        }
        .nav-item .nav-icon { width: 20px; height: 20px; object-fit: contain; }
        .nav-item.active { 
            color: var(--text-primary); 
            position: relative; 
        }
        .nav-item.active::after { 
            content: ''; 
            position: absolute; 
            top: -6px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 20px; 
            height: 2px; 
            background: linear-gradient(to right, var(--cyan-dim), var(--cyan-glow)); 
            border-radius: 5px; 
            box-shadow: 0 0 15px var(--cyan-glow); 
        }
        .nav-item:not(.active):hover { color: var(--cyan-glow); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/aigc.png" alt="AIGC"><span>BCBS</span></div>
                <div class="header-controls"><button class="lang-btn">🇺🇸 EN ⌄</button><button id="connectWalletBtn" class="connect-btn">Connect wallet</button></div>
            </div>
            <div class="page-title"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/ecosystem.icon.png" alt="生态"> 生态</div>
            
            <div class="sci-fi-card">
                <div class="card-image-box"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/reust.png" alt="REUST"></div>
                <div class="card-content">
                    <div class="card-header"><h2>AI 算力铸造房产</h2><span class="arrow">&gt;</span></div>
                    <div class="card-separator">--</div>
                    <div class="card-description">BCBS链上资管铸造 · REUST不动产通证锚定海外高端豪宅资产，初始定价2USDT对标BTC价值存储赛道，实体房产背书，合规走向海外币安等交易所。</div>
                </div>
            </div>
            
            <div class="sci-fi-card">
                <div class="card-image-box"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/veust.png" alt="VEUST"></div>
                <div class="card-content">
                    <div class="card-header"><h2>AI 算力铸造汽车</h2><span class="arrow">&gt;</span></div>
                    <div class="card-separator">--</div>
                    <div class="card-description">VEUST是BCBS链上资管体系推出的新能源汽车数字化权益通证，锚定海外高端新能源豪华车辆，初始公允定价2USDT，对标ETH价值存储逻辑，以实体车辆为价值基石，实现豪车资产碎片化上链、质押流转、收益确权，构建实体汽车资产RWA标准化流通基建。</div>
                </div>
            </div>
            
            <div class="panel">
                <div style="color:var(--text-primary);font-size:14px;font-weight:500;margin-bottom:8px;">探索 BCBS 生态</div>
                <div style="color:var(--text-secondary);font-size:12px;margin-bottom:12px;">即将推出更多 DApp、NFT 市场与 GameFi 项目</div>
                <button class="btn-primary">了解更多</button>
            </div>
        </div>
        
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/index.icon.png" alt="资产"><span>资产</span></a>
            <a href="stake.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/stake.icon.png" alt="质押"><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/liquidity.icon.png" alt="流动性"><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/invite.icon.png" alt="邀请"><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item active"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/ecosystem.icon.png" alt="生态"><span>生态</span></a>
        </div>
    </div>
    
    <script>
        const AIGC_ADDRESS = '0xdB5A187FE04A249AC2F2E821b72b771d01b2C0e8';
        const BCBS_ADDRESS = '0x9ECcC2B06582Ca14509CAd41F1d5204979Ce6995';
        const HSBC_ADDRESS = '0x20aD84A60902A91F036bD6bdB85AD1d61B2f65C1';
        let provider, signer, currentAccount;
        const connectBtn = document.getElementById('connectWalletBtn');
        
        function updateUIForConnected(acc){ 
            connectBtn.textContent=`${acc.substring(0,6)}...${acc.substring(acc.length-4)}`; 
            connectBtn.classList.add('connected'); 
            connectBtn.onclick=disconnectWallet; 
        }
        function setDisconnectedUI(){ 
            connectBtn.textContent='Connect wallet'; 
            connectBtn.classList.remove('connected'); 
            connectBtn.onclick=connectWallet; 
        }
        async function connectWallet(){ 
            if(typeof window.ethereum==='undefined'){ alert('请安装MetaMask'); return; } 
            const accounts=await window.ethereum.request({method:'eth_requestAccounts'}); 
            currentAccount=accounts[0]; 
            provider=new ethers.providers.Web3Provider(window.ethereum); 
            signer=provider.getSigner(); 
            updateUIForConnected(currentAccount); 
        }
        function disconnectWallet(){ 
            currentAccount=null; 
            signer=null; 
            setDisconnectedUI(); 
        }
        function handleAccountsChanged(accounts){ 
            if(accounts.length===0)disconnectWallet(); 
            else{ currentAccount=accounts[0]; provider=new ethers.providers.Web3Provider(window.ethereum); signer=provider.getSigner(); updateUIForConnected(currentAccount); } 
        }
        async function autoConnect(){ 
            if(typeof window.ethereum!=='undefined'){ 
                provider=new ethers.providers.Web3Provider(window.ethereum); 
                try{ 
                    const accounts=await provider.listAccounts(); 
                    if(accounts.length>0){ 
                        currentAccount=accounts[0]; 
                        signer=provider.getSigner(); 
                        updateUIForConnected(currentAccount); 
                    }else setDisconnectedUI(); 
                }catch(e){ setDisconnectedUI(); } 
                window.ethereum.on('accountsChanged',handleAccountsChanged); 
                window.ethereum.on('chainChanged',()=>window.location.reload()); 
            } 
        }
        window.addEventListener('load',autoConnect);
    </script>
</body>
</html>
