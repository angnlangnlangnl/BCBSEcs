<!-- ecosystem.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生态 - BCBS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: #05050a; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: #ffffff; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background: radial-gradient(circle at center, #111122 0%, #03030a 100%); background-image: radial-gradient(2px 2px at 20px 30px, #eee, transparent), radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent); background-size: 100px 100px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: bold; background: linear-gradient(to right, #aaa, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .connect-btn { background: transparent; border: 1px solid #f90; color: #f90; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 0 10px rgba(255,153,0,0.1); transition: all 0.2s; white-space: nowrap; }
        .connect-btn.connected { background: rgba(255,153,0,0.2); border-color: #ffaa00; color: #ffd700; }
        .panel { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 12px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .page-title { font-size: 24px; color: #f90; text-align: center; margin: 10px 0 20px; }
        .btn-primary { width: 100%; background: linear-gradient(90deg, #f4a200, #ffd700); border: none; border-radius: 8px; padding: 12px; font-weight: bold; color: #111; cursor: pointer; }
        .sci-fi-card { background: rgba(8,10,20,0.7); border-radius: 12px; padding: 10px 15px 10px 0; border: 1px solid #2a2a3a; position: relative; display: flex; align-items: center; margin-bottom: 20px; min-height: 113px; }
        .sci-fi-card::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 12px; padding: 1px; background: linear-gradient(135deg, #f90 0%, transparent 60%, transparent 80%, #f90 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.8; }
        .card-image-box { flex: 0 0 110px; height: 100px; display: flex; justify-content: center; align-items: center; position: relative; margin-left: 10px; }
        .vault-box { width: 70px; height: 80px; background: linear-gradient(135deg, #151515, #000); border: 1px solid #f90; border-radius: 6px; transform: perspective(400px) rotateY(-15deg) rotateX(10deg); box-shadow: 0 0 30px rgba(255,153,0,0.15), inset 0 0 20px rgba(255,153,0,0.1); position: relative; }
        .vault-box::after { content: 'X'; color: #f90; font-size: 24px; font-weight: bold; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-shadow: 0 0 15px #f90; }
        .vault-box::before { content: 'PREDICTION\nVAULT'; white-space: pre-wrap; color: #f90; font-size: 6px; font-weight: bold; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); letter-spacing: 1px; text-align: center; }
        .base-glow { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 90px; height: 20px; background: radial-gradient(ellipse at center, rgba(255,153,0,0.4) 0%, transparent 70%); border-radius: 50%; }
        .crystal-ball { position: absolute; right: -5px; bottom: 15px; width: 24px; height: 24px; background: radial-gradient(circle at 35% 35%, #00d4ff, #004488); border-radius: 50%; border: 1px solid #00d4ff; box-shadow: 0 0 20px rgba(0,180,255,0.6); }
        .lp-disk { width: 80px; height: 80px; background: radial-gradient(circle, rgba(0,30,80,0.8), #020510); border: 2px solid #00d4ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(0,180,255,0.3), inset 0 0 30px rgba(0,180,255,0.2); position: relative; transform: perspective(400px) rotateX(60deg) rotateZ(-20deg); }
        .lp-disk::before { content: 'LP'; color: #f90; font-size: 18px; font-weight: bold; text-shadow: 0 0 15px #f90; transform: rotateZ(20deg); }
        .lp-orbit { position: absolute; width: 95px; height: 95px; border: 2px dashed #f90; border-radius: 50%; opacity: 0.6; animation: spin 8s linear infinite; }
        .lp-token { position: absolute; width: 20px; height: 20px; background: #111; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; border: 1px solid #f90; color: #f90; box-shadow: 0 0 10px rgba(255,153,0,0.5); }
        .token-x { top: -8px; left: 20px; border-color: #f90; color: #f90; } .token-x::after { content: 'X'; font-size: 10px; }
        .token-eth { bottom: -6px; right: 20px; border-color: #00d4ff; color: #00d4ff; } .token-eth::after { content: '♦'; font-size: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .card-content { flex: 1; padding: 5px 15px 5px 10px; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .card-header h2 { font-size: 18px; font-weight: 500; color: #f90; letter-spacing: 1px; }
        .card-header .arrow { color: #f90; font-size: 20px; font-weight: 300; cursor: pointer; }
        .card-separator { color: #666; margin-bottom: 4px; letter-spacing: 1px; font-size: 14px; }
        .card-description { font-size: 7px; line-height: 1.4; color: #aab; text-align: justify; }
        .bottom-nav { flex-shrink: 0; background: rgba(15,15,30,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,153,0,0.15); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 12px 0; margin: 0 15px 15px 15px; position: relative; }
        .bottom-nav::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; transition: all 0.2s ease; text-decoration: none; }
        .nav-item .icon { font-size: 20px; }
        .nav-item.active { color: #f90; position: relative; }
        .nav-item.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: #f90; border-radius: 5px; box-shadow: 0 0 10px #f90; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header"><div class="logo-area">🚀 <span>BCBS</span></div><div class="header-controls"><button class="lang-btn">🇺🇸 EN ⌄</button><button id="connectWalletBtn" class="connect-btn">Connect wallet</button></div></div>
            <div class="page-title">🌐 生态</div>
            <div class="sci-fi-card"><div class="card-image-box"><div class="vault-box"></div><div class="crystal-ball"></div><div class="base-glow"></div></div><div class="card-content"><div class="card-header"><h2>xAI预测金库</h2><span class="arrow">&gt;</span></div><div class="card-separator">--</div><div class="card-description">去中心化预测市场与收益金库合一，使用者可参与全球热门事件预测，透过链上公开机制获利，资产于安全环境稳定增值</div></div></div>
            <div class="sci-fi-card"><div class="card-image-box"><div class="lp-disk"><div class="lp-orbit"></div><div class="lp-token token-x"></div><div class="lp-token token-eth"></div></div></div><div class="card-content"><div class="card-header"><h2>LP做市商</h2><span class="arrow">&gt;</span></div><div class="card-separator">--</div><div class="card-description">成为生态流动性提供者，活络交易市场，赚取手续费、平台奖励与额外收益，最大化资产使用效率</div></div></div>
            <div class="panel"><div style="color:#f90;font-size:14px;font-weight:600;">探索 BCBS 生态</div><div style="color:#aaa;font-size:12px;margin-bottom:12px;">即将推出更多 DApp、NFT 市场与 GameFi 项目</div><button class="btn-primary">了解更多</button></div>
        </div>
        <div class="bottom-nav"><a href="index.html" class="nav-item"><span class="icon">💼</span><span>资产</span></a><a href="stake.html" class="nav-item"><span class="icon">🔒</span><span>质押</span></a><a href="liquidity.html" class="nav-item"><span class="icon">💧</span><span>流动性</span></a><a href="invite.html" class="nav-item"><span class="icon">📨</span><span>邀请</span></a><a href="ecosystem.html" class="nav-item active"><span class="icon">🌐</span><span>生态</span></a></div>
    </div>
    <script>
        const AIGC_ADDRESS = '0x49CaB5FCE501e3209d1933a745413D061879AA7a';
        const BCBS_ADDRESS = '0xC2ED87266c9F35eeb6715624264A8163A361FCd7';
        const HSBC_ADDRESS = '0x20aD84A60902A91F036bD6bdB85AD1d61B2f65C1';
        let provider, signer, currentAccount;
        const connectBtn = document.getElementById('connectWalletBtn');
        function updateUIForConnected(acc){ connectBtn.textContent=`${acc.substring(0,6)}...${acc.substring(acc.length-4)}`; connectBtn.classList.add('connected'); connectBtn.onclick=disconnectWallet; }
        function setDisconnectedUI(){ connectBtn.textContent='Connect wallet'; connectBtn.classList.remove('connected'); connectBtn.onclick=connectWallet; }
        async function connectWallet(){ if(typeof window.ethereum==='undefined'){ alert('请安装MetaMask'); return; } const accounts=await window.ethereum.request({method:'eth_requestAccounts'}); currentAccount=accounts[0]; provider=new ethers.providers.Web3Provider(window.ethereum); signer=provider.getSigner(); updateUIForConnected(currentAccount); }
        function disconnectWallet(){ currentAccount=null; signer=null; setDisconnectedUI(); }
        function handleAccountsChanged(accounts){ if(accounts.length===0)disconnectWallet(); else{ currentAccount=accounts[0]; provider=new ethers.providers.Web3Provider(window.ethereum); signer=provider.getSigner(); updateUIForConnected(currentAccount); } }
        async function autoConnect(){ if(typeof window.ethereum!=='undefined'){ provider=new ethers.providers.Web3Provider(window.ethereum); try{ const accounts=await provider.listAccounts(); if(accounts.length>0){ currentAccount=accounts[0]; signer=provider.getSigner(); updateUIForConnected(currentAccount); }else setDisconnectedUI(); }catch(e){ setDisconnectedUI(); } window.ethereum.on('accountsChanged',handleAccountsChanged); window.ethereum.on('chainChanged',()=>window.location.reload()); } }
        window.addEventListener('load',autoConnect);
    </script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" onload="autoConnect"></script>
</body>
</html>
