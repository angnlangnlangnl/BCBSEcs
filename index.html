<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资产 - BCBS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg-color: #050B15;
            --card-bg: rgba(8, 20, 48, 0.4);
            --border-color: rgba(0, 136, 255, 0.15);
            --text-primary: #FFFFFF;
            --text-primary-soft: #E2F0FB;
            --text-secondary: #8AA9C9;
            --text-dim: rgba(255, 255, 255, 0.45);
            --cyan-glow: #00DDFF;
            --cyan-dim: #0088FF;
            --cyan-deep: #0A2463;
        }

        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: var(--text-primary); }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background: radial-gradient(circle at 50% 10%, #102040 0%, #050B15 100%); border-radius: 20px; box-shadow: 0 0 40px rgba(0, 136, 255, 0.1); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .app-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/bg.png'); background-size: cover; background-position: center top; background-repeat: no-repeat; -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%); mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%); opacity: 0.8; z-index: 0; pointer-events: none; border-radius: 20px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; position: relative; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.5px; }
        .logo-area img { width: 24px; height: 24px; margin-right: 5px; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; position: relative; }
        .lang-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; position: relative; }
        .lang-btn.active { background: rgba(0, 136, 255, 0.1); border-color: var(--cyan-dim); color: var(--cyan-glow); }
        .lang-dropdown { display: none; position: absolute; top: 35px; right: 0; background: rgba(8, 20, 48, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; width: 200px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8); z-index: 999; flex-direction: column; gap: 6px; }
        .lang-dropdown.open { display: flex; }
        .lang-option { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 6px; color: var(--text-primary-soft); font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .lang-option:hover { background: rgba(0, 204, 255, 0.1); color: var(--text-primary); }
        .lang-option .code { color: var(--text-secondary); font-size: 12px; font-weight: 500; margin-left: 8px; }
        .connect-btn { background: transparent; border: 1px solid rgba(0, 221, 255, 0.3); color: var(--cyan-glow); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; box-shadow: 0 0 15px rgba(0, 204, 255, 0.05); transition: all 0.3s; white-space: nowrap; }
        .connect-btn:hover:not(:disabled) { box-shadow: 0 0 25px rgba(0, 204, 255, 0.2); background: rgba(0, 204, 255, 0.05); }
        .connect-btn.connected { background: rgba(0, 204, 255, 0.1); border-color: var(--cyan-glow); color: var(--cyan-glow); }
        .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .panel { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-color); backdrop-filter: blur(8px); position: relative; box-shadow: inset 0 0 30px rgba(0, 136, 255, 0.02); }
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 16px; padding: 1px; background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--cyan-glow)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.5; }
        .profile-panel { display: flex; align-items: center; justify-content: space-between; padding: 15px 15px; flex-wrap: wrap; }
        .profile-left { display: flex; align-items: center; gap: 12px; }
        .avatar-circle { width: 50px; height: 50px; background: linear-gradient(135deg, var(--cyan-dim), var(--cyan-glow)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #050B15; box-shadow: 0 0 20px rgba(0, 204, 255, 0.3); }
        .level-badge { background: linear-gradient(90deg, var(--cyan-dim), var(--cyan-glow)); color: #050B15; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; display: inline-block; margin-bottom: 4px; }
        .identity-row { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
        .rate-row { font-size: 11px; color: var(--cyan-glow); line-height: 1.4; font-weight: 500; }
        .total-value { text-align: right; }
        .total-label { font-size: 12px; color: var(--text-secondary); }
        .total-amount { font-size: 22px; font-weight: 700; color: var(--text-primary); }
        .total-amount small { font-size: 14px; font-weight: 400; color: var(--text-secondary); }
        .dividend-container { width: 100%; margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(0, 136, 255, 0.1); }
        .dividend-title { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
        .dividend-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .dividend-item { font-size: 10px; color: #4caf50; line-height: 1.6; cursor: pointer; padding: 2px 8px; border-radius: 12px; transition: all 0.2s; background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.15); }
        .dividend-item:hover { background: rgba(76,175,80,0.15); }
        .dividend-empty { font-size: 11px; color: var(--text-secondary); }
        .asset-card { background: rgba(0, 16, 40, 0.5); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(4px); transition: all 0.2s; }
        .asset-card:hover { border-color: rgba(0, 204, 255, 0.3); box-shadow: 0 0 15px rgba(0, 136, 255, 0.03); }
        .asset-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
        .asset-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .asset-info { flex: 1; }
        .asset-name { font-size: 15px; color: var(--text-primary); font-weight: 600; }
        .asset-price { font-size: 12px; color: var(--text-secondary); }
        .asset-right { text-align: right; }
        .asset-balance { font-size: 15px; color: var(--text-primary); font-weight: 600; }
        .asset-usd-value { font-size: 12px; color: var(--cyan-glow); }
        .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0, 204, 255, 0.15); border-top: 2px solid var(--cyan-glow); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 4px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bottom-nav { flex-shrink: 0; background: rgba(5, 11, 21, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(0, 136, 255, 0.15); border-radius: 20px; box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.8); display: flex; justify-content: space-around; padding: 12px 0; margin: 0 15px 15px 15px; position: relative; z-index: 10; }
        .bottom-nav::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--cyan-glow)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.5; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; transition: all 0.3s ease; text-decoration: none; }
        .nav-item .nav-icon { width: 20px; height: 20px; object-fit: contain; }
        .nav-item.active { color: var(--text-primary); position: relative; }
        .nav-item.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: linear-gradient(to right, var(--cyan-dim), var(--cyan-glow)); border-radius: 5px; box-shadow: 0 0 15px var(--cyan-glow); }
        .nav-item:not(.active):hover { color: var(--cyan-glow); }
    </style>
</head>
<body>

                <div class="asset-card"><div class="asset-icon"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/bcbs.png" alt="BCBS"></div><div class="asset-info"><div class="asset-name">BCBS</div><div class="asset-price" id="price-BCBS">$0.00</div></div><div class="asset-right"><div class="asset-balance" id="bal-BCBS">0.0000</div><div class="asset-usd-value" id="usd-BCBS">≈ $0.00</div></div></div>
                <div class="asset-card"><div class="asset-icon"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/HSBC.icon.png" alt="HSBC"></div><div class="asset-info"><div class="asset-name">HSBC</div><div class="asset-price">$0.00</div></div><div class="asset-right"><div class="asset-balance" id="bal-HSBC">0.0000</div><div class="asset-usd-value" id="usd-HSBC">≈ $0.00</div></div></div>

        <div class="bottom-nav">
            <a href="index.html" class="nav-item active"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/index.icon.png" alt="资产"><span>资产</span></a>
            <a href="stake.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/stake.icon.png" alt="质押"><span>质押</span></a>

    <script>
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');
        langBtn.addEventListener('click', (e) => { e.stopPropagation(); langDropdown.classList.toggle('open'); langBtn.classList.toggle('active'); });
        document.addEventListener('click', (e) => { if (!langDropdown.contains(e.target) && e.target !== langBtn) { langDropdown.classList.remove('open'); langBtn.classList.remove('active'); } });
        document.querySelectorAll('.lang-option').forEach(option => { option.addEventListener('click', () => { langDropdown.classList.remove('open'); langBtn.classList.remove('active'); }); });

        const AIGC_ADDRESS = '0xdB5A187FE04A249AC2F2E821b72b771d01b2C0e8';
        const BCBS_ADDRESS = '0x9ECcC2B06582Ca14509CAd41F1d5204979Ce6995';
        const HSBC_ADDRESS = '0x20aD84A60902A91F036bD6bdB85AD1d61B2f65C1';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';
        const BNB_ORACLE_ADDR = '0x0567F2323251f0Aab15c8dFb1967E4e8A7D42aeE';

        const BNB_ORACLE_ABI = ["function latestRoundData() view returns (uint80 roundId, int256 answer, uint256 startedAt, uint256 updatedAt, uint80 answeredInRound)"];
        const AIGC_ABI = [
            "function getNodeLevel(address) view returns (uint8)",
            "function identityLevel(address) view returns (uint256)",
            "function balanceOf(address) view returns (uint256)",
            "function getPendingDividend(address user, uint8 pool) view returns (uint256)",
            "function claimDividend(uint8 pool) returns (bool)",
            "function isInPool(uint8, address) view returns (bool)"
        ];
        const BCBS_ABI = ["function balanceOf(address) view returns (uint256)", "function userRate(address) view returns (uint256)", "function getBCBSPrice() view returns (uint256)"];
        const ERC20_ABI = ["function balanceOf(address) view returns (uint256)"];

        let currentAccount = null, provider = null, signer = null;
        let aigcContract, bcbsContract, hsbcContract, usdtContract, bnbOracle;
        let isLoading = false, refreshTimer = null;
        const connectBtn = document.getElementById('connectWalletBtn');
        const nodeNames = ['普通用户', '首富节点', '星链节点', '创世节点'];
        const poolNames = ['首富池', '星链池', '创世池', 'S4池', 'S5池', 'S6池', 'S7池', 'S8池'];

        function initContracts() {
            if (provider && signer) {
                aigcContract = new ethers.Contract(AIGC_ADDRESS, AIGC_ABI, signer);
                bcbsContract = new ethers.Contract(BCBS_ADDRESS, BCBS_ABI, signer);
                hsbcContract = new ethers.Contract(HSBC_ADDRESS, ERC20_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, ERC20_ABI, signer);
                bnbOracle = new ethers.Contract(BNB_ORACLE_ADDR, BNB_ORACLE_ABI, provider);
            }
        }

        async function getBNBPrice() { try { const [, a] = await bnbOracle.latestRoundData(); return parseFloat(ethers.utils.formatUnits(a, 8)); } catch (e) { return 580; } }
        async function getBCBSPrice() { try { const r = await bcbsContract.getBCBSPrice(); const p = parseFloat(ethers.utils.formatEther(r)); if (p > 0) return p; } catch (e) {} return 0; }

        window.handleConnect = async function() { if (isLoading) return; if (currentAccount) { disconnectWallet(); return; } await connectWallet(); };

        async function connectWallet() {
            if (!window.ethereum) { alert('请安装 MetaMask'); return; }
            isLoading = true; connectBtn.disabled = true; connectBtn.innerHTML = '连接中<span class="loading-spinner"></span>';
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentAccount = accounts[0]; provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner();
                initContracts();
                connectBtn.textContent = currentAccount.substring(0, 6) + '...' + currentAccount.substring(currentAccount.length - 4);
                connectBtn.classList.add('connected'); connectBtn.disabled = false;
                await loadAllData();
                if (refreshTimer) clearInterval(refreshTimer);
                refreshTimer = setInterval(async () => { if (currentAccount) await loadAllData(); }, 30000);
            } catch (e) { handleConnectionError(e); connectBtn.disabled = false; connectBtn.innerHTML = 'Connect wallet'; }
            finally { isLoading = false; }
        }

        function disconnectWallet() { currentAccount = null; provider = null; signer = null; aigcContract = null; bcbsContract = null; hsbcContract = null; usdtContract = null; bnbOracle = null; if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } connectBtn.textContent = 'Connect wallet'; connectBtn.classList.remove('connected'); connectBtn.disabled = false; resetUI(); }
        function handleConnectionError(err) { if (err.code === 4001) alert('请在 MetaMask 中授权连接'); else alert('连接失败: ' + (err.message || '未知错误')); }

        async function loadAllData() {
            if (!currentAccount || !aigcContract || !bcbsContract) return;
            const [bnbPrice, bcbsPrice] = await Promise.all([getBNBPrice(), getBCBSPrice()]);
            document.getElementById('price-BNB').textContent = '$' + bnbPrice.toFixed(2);
            document.getElementById('price-BCBS').textContent = '$' + bcbsPrice.toFixed(4);

            let nodeLevel = 0, identityLevel = 0, userRate = 0;
            try { const lvl = await aigcContract.getNodeLevel(currentAccount); nodeLevel = parseInt(lvl.toString()); } catch (e) {}
            if (nodeLevel === 0) {
                try { if (await aigcContract.isInPool(2, currentAccount)) nodeLevel = 3; } catch (e) {}
            }
            if (nodeLevel === 0) {
                try { if (await aigcContract.isInPool(1, currentAccount)) nodeLevel = 2; } catch (e) {}
            }
            if (nodeLevel === 0) {
                try { if (await aigcContract.isInPool(0, currentAccount)) nodeLevel = 1; } catch (e) {}
            }
            try { const id = await aigcContract.identityLevel(currentAccount); identityLevel = parseInt(id.toString()); } catch (e) {}
            try { const rate = await bcbsContract.userRate(currentAccount); userRate = parseFloat(ethers.utils.formatEther(rate)); } catch (e) {}
            if (userRate === 0) { const baseRates = [0, 0.02, 0.04, 0.15]; userRate = baseRates[nodeLevel] || 0; }

            document.getElementById('userLevel').textContent = nodeNames[nodeLevel] || '普通用户';
            document.getElementById('identityRow').textContent = '身份：S' + identityLevel;
            document.getElementById('rateRow').textContent = '利率：' + (userRate * 100).toFixed(1) + '%';

            let dividendHtml = '', hasDividend = false;
            for (let i = 0; i < 8; i++) {
                try {
                    const inPool = await aigcContract.isInPool(i, currentAccount);
                    if (inPool) {
                        hasDividend = true;
                        const pend = await aigcContract.getPendingDividend(currentAccount, i);
                        const val = parseFloat(ethers.utils.formatEther(pend));
                        dividendHtml += `<span class="dividend-item" onclick="claimPoolDividend(${i})" title="点击领取">${poolNames[i]} ${val.toFixed(4)}</span>`;
                    }
                } catch (e) {}
            }
            if (!hasDividend) dividendHtml = '<span class="dividend-empty">暂无</span>';
            document.getElementById('dividendList').innerHTML = dividendHtml;

            let bnb = 0, usdt = 0, aigc = 0, bcbs = 0, hsbc = 0;
            try { bnb = parseFloat(ethers.utils.formatEther(await provider.getBalance(currentAccount))); } catch (e) {}
            try { usdt = parseFloat(ethers.utils.formatEther(await usdtContract.balanceOf(currentAccount))); } catch (e) {}
            try { aigc = parseFloat(ethers.utils.formatEther(await aigcContract.balanceOf(currentAccount))); } catch (e) {}
            try { bcbs = parseFloat(ethers.utils.formatEther(await bcbsContract.balanceOf(currentAccount))); } catch (e) {}
            try { hsbc = parseFloat(ethers.utils.formatEther(await hsbcContract.balanceOf(currentAccount))); } catch (e) {}

            const tokens = [{ sym: 'BNB', balance: bnb, price: bnbPrice },{ sym: 'USDT', balance: usdt, price: 1 },{ sym: 'AIGC', balance: aigc, price: 1 },{ sym: 'BCBS', balance: bcbs, price: bcbsPrice },{ sym: 'HSBC', balance: hsbc, price: 0 }];
            let total = 0;
            for (const t of tokens) { const usdVal = t.balance * t.price; total += usdVal; document.getElementById('bal-' + t.sym).textContent = t.balance.toFixed(4); document.getElementById('usd-' + t.sym).textContent = '≈ $' + usdVal.toFixed(2); }
            document.getElementById('totalAssetValue').innerHTML = '$' + total.toFixed(2) + ' <small>USD</small>';
        }

        window.claimPoolDividend = async function(poolId) {
            if (!currentAccount || !aigcContract) { alert('请先连接钱包'); return; }
            try { const tx = await aigcContract.claimDividend(poolId); await tx.wait(); alert('✅ 领取成功！'); await loadAllData(); } catch (e) { alert('领取失败: ' + (e.reason || e.message)); }
        };

        function resetUI() {
            document.getElementById('totalAssetValue').innerHTML = '0.00 <small>USD</small>';
            document.getElementById('userLevel').textContent = '普通用户'; document.getElementById('identityRow').textContent = '身份：S0';
            document.getElementById('rateRow').textContent = '利率：0.00%'; document.getElementById('dividendList').innerHTML = '暂无';
            document.getElementById('price-BNB').textContent = '$580.25'; document.getElementById('price-BCBS').textContent = '$0.00';
            ['BNB','USDT','AIGC','BCBS','HSBC'].forEach(s => { document.getElementById('bal-' + s).textContent = '0.0000'; document.getElementById('usd-' + s).textContent = '≈ $0.00'; });
        }

        async function autoConnect() {
            if (!window.ethereum) return;
            try {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts && accounts.length > 0) { currentAccount = accounts[0]; provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner(); initContracts(); connectBtn.textContent = currentAccount.substring(0, 6) + '...' + currentAccount.substring(currentAccount.length - 4); connectBtn.classList.add('connected'); connectBtn.disabled = false; await loadAllData(); if (refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(async () => { if (currentAccount) await loadAllData(); }, 30000); }
            } catch (e) {}
            window.ethereum.on('accountsChanged', (accounts) => { if (!accounts || accounts.length === 0) disconnectWallet(); else { currentAccount = accounts[0]; provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner(); initContracts(); connectBtn.textContent = currentAccount.substring(0, 6) + '...' + currentAccount.substring(currentAccount.length - 4); connectBtn.classList.add('connected'); connectBtn.disabled = false; loadAllData(); } });
            window.ethereum.on('chainChanged', () => { if (currentAccount) { provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner(); initContracts(); loadAllData(); } });
            window.ethereum.on('disconnect', () => disconnectWallet());
        }

        window.addEventListener('load', () => setTimeout(() => autoConnect(), 500));
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && currentAccount) loadAllData(); });
        window.addEventListener('beforeunload', () => { if (refreshTimer) clearInterval(refreshTimer); });
    </script>
</body>
</html>
