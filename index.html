<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资产 - BCBS</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: #ffffff; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background: radial-gradient(circle at center, #111 0%, #030303 100%); background-image: radial-gradient(circle at 10% 20%, rgba(255,170,0,0.05) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(255,170,0,0.05) 0%, transparent 20%); border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: bold; background: linear-gradient(to right, #aaa, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .connect-btn { background: transparent; border: 1px solid #f90; color: #f90; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 0 10px rgba(255,153,0,0.1); transition: all 0.2s; white-space: nowrap; }
        .connect-btn.connected { background: rgba(255,153,0,0.2); border-color: #ffaa00; color: #ffd700; }
        .panel { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; box-shadow: inset 0 0 20px rgba(255,170,0,0.02); }
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 12px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .profile-panel { display: flex; align-items: center; justify-content: space-between; padding: 15px 15px; }
        .profile-left { display: flex; align-items: center; gap: 12px; }
        .avatar-circle { width: 50px; height: 50px; background: linear-gradient(135deg, #f3a900, #ffd700); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #111; box-shadow: 0 0 15px rgba(255,200,0,0.3); }
        .level-badge { background: #f90; color: #111; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .node-info { font-size: 11px; color: #ccc; margin-top: 4px; line-height: 1.4; }
        .dividend-info { font-size: 10px; color: #4caf50; margin-top: 2px; }
        .total-value { text-align: right; }
        .total-label { font-size: 12px; color: #888; }
        .total-amount { font-size: 22px; font-weight: 700; color: #fff; }
        .total-amount small { font-size: 14px; font-weight: 400; color: #aaa; }
        .asset-card { background: rgba(30,30,40,0.5); border: 1px solid #333; border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .asset-icon { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #555, #333); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .asset-info { flex: 1; }
        .asset-name { font-size: 15px; color: #fff; font-weight: 600; }
        .asset-price { font-size: 12px; color: #aaa; }
        .asset-right { text-align: right; }
        .asset-balance { font-size: 15px; color: #fff; font-weight: 600; }
        .asset-usd-value { font-size: 12px; color: #f90; }
        .bottom-nav { flex-shrink: 0; background: rgba(15,15,30,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,153,0,0.15); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 12px 0; margin: 0 15px 15px 15px; position: relative; }
        .bottom-nav::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; transition: all 0.2s ease; text-decoration: none; }
        .nav-item .icon { font-size: 20px; }
        .nav-item.active { color: #f90; position: relative; }
        .nav-item.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: #f90; border-radius: 5px; box-shadow: 0 0 10px #f90; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area">🚀 <span>BCBS</span></div>
                <div class="header-controls">
                    <button class="lang-btn" id="langBtn">🇺🇸 EN</button>
                    <button id="connectWalletBtn" class="connect-btn" onclick="handleConnect()">Connect wallet</button>
                </div>
            </div>

            <div class="panel profile-panel">
                <div class="profile-left">
                    <div class="avatar-circle">👤</div>
                    <div>
                        <div class="level-badge" id="userLevel">普通用户</div>
                        <div class="node-info" id="nodeInfo">身份：S0 | 利率：0.00%</div>
                        <div class="dividend-info" id="dividendInfo">分红池：暂无</div>
                    </div>
                </div>
                <div class="total-value">
                    <div class="total-label">总资产价值</div>
                    <div class="total-amount" id="totalAssetValue">0.00 <small>USD</small></div>
                </div>
            </div>

            <div id="assetListContainer">
                <div class="asset-card"><div class="asset-icon">💛</div><div class="asset-info"><div class="asset-name">BNB</div><div class="asset-price">$580.25</div></div><div class="asset-right"><div class="asset-balance" id="bal-BNB">0.0000</div><div class="asset-usd-value" id="usd-BNB">≈ $0.00</div></div></div>
                <div class="asset-card"><div class="asset-icon">💵</div><div class="asset-info"><div class="asset-name">USDT</div><div class="asset-price">$1.00</div></div><div class="asset-right"><div class="asset-balance" id="bal-USDT">0.0000</div><div class="asset-usd-value" id="usd-USDT">≈ $0.00</div></div></div>
                <div class="asset-card"><div class="asset-icon">🟡</div><div class="asset-info"><div class="asset-name">AIGC</div><div class="asset-price">$1.20</div></div><div class="asset-right"><div class="asset-balance" id="bal-AIGC">0.0000</div><div class="asset-usd-value" id="usd-AIGC">≈ $0.00</div></div></div>
                <div class="asset-card"><div class="asset-icon">🏦</div><div class="asset-info"><div class="asset-name">BCBS</div><div class="asset-price">$0.95</div></div><div class="asset-right"><div class="asset-balance" id="bal-BCBS">0.0000</div><div class="asset-usd-value" id="usd-BCBS">≈ $0.00</div></div></div>
                <div class="asset-card"><div class="asset-icon">🔷</div><div class="asset-info"><div class="asset-name">HSBC</div><div class="asset-price">$0.85</div></div><div class="asset-right"><div class="asset-balance" id="bal-HSBC">0.0000</div><div class="asset-usd-value" id="usd-HSBC">≈ $0.00</div></div></div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="index.html" class="nav-item active"><span class="icon">💼</span><span>资产</span></a>
            <a href="stake.html" class="nav-item"><span class="icon">🔒</span><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><span class="icon">💧</span><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><span class="icon">📨</span><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><span class="icon">🌐</span><span>生态</span></a>
        </div>
    </div>

    <script>
        // ========== 合约地址 ==========
        const AIGC_ADDR = '0x49CaB5FCE501e3209d1933a745413D061879AA7a';
        const BCBS_ADDR = '0xC2ED87266c9F35eeb6715624264A8163A361FCd7';
        const HSBC_ADDR = '0x20aD84A60902A91F036bD6bdB85AD1d61B2f65C1';
        const USDT_ADDR = '0x55d398326f99059fF775485246999027B3197955';

        // ========== 全局变量 ==========
        let currentAccount = null;
        const connectBtn = document.getElementById('connectWalletBtn');
        
        // 初始化 RPC 和合约
        const rpc = new ethers.providers.JsonRpcProvider('https://bsc-dataseed1.binance.org');
        const aigc = new ethers.Contract(AIGC_ADDR, [
            "function getNodeLevel(address) view returns (uint8)",
            "function identityLevel(address) view returns (uint256)",
            "function getRateLevel(address) view returns (uint256)",
            "function balanceOf(address) view returns (uint256)"
        ], rpc);
        const bcbs = new ethers.Contract(BCBS_ADDR, ["function balanceOf(address) view returns (uint256)"], rpc);
        const hsbc = new ethers.Contract(HSBC_ADDR, ["function balanceOf(address) view returns (uint256)"], rpc);
        const usdt = new ethers.Contract(USDT_ADDR, ["function balanceOf(address) view returns (uint256)"], rpc);

        const nodeNames = ['普通用户', '首富节点', '星链节点', '创世节点'];
        const poolMap = { 0: '暂无', 1: '首富池', 2: '星链池', 3: '创世池' };

        // ========== 核心：连接/断开 ==========
        window.handleConnect = async function() {
            // 已连接 → 断开
            if (currentAccount) {
                currentAccount = null;
                connectBtn.textContent = 'Connect wallet';
                connectBtn.classList.remove('connected');
                resetUI();
                return;
            }

            // 未连接 → 连接
            if (!window.ethereum) {
                alert('请安装 MetaMask 或使用内置 Web3 浏览器');
                return;
            }

            try {
                // 关键步骤：请求账户权限
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts' 
                });
                
                if (accounts && accounts.length > 0) {
                    currentAccount = accounts[0];
                    connectBtn.textContent = currentAccount.substring(0, 6) + '...' + currentAccount.substring(currentAccount.length - 4);
                    connectBtn.classList.add('connected');
                    console.log('✅ 钱包已连接:', currentAccount);
                    
                    // 加载数据
                    await loadAllData();
                }
            } catch (err) {
                console.error('连接失败:', err);
                if (err.code === 4001) {
                    alert('请在 MetaMask 中授权连接');
                } else if (err.code === -32002) {
                    alert('MetaMask 正在等待授权，请检查插件');
                } else {
                    alert('连接失败: ' + (err.message || '未知错误'));
                }
            }
        };

        // ========== 自动连接 ==========
        async function autoConnect() {
            if (!window.ethereum) return;
            
            try {
                const accounts = await window.ethereum.request({ 
                    method: 'eth_accounts'  // 仅获取已授权的账户，不弹窗
                });
                
                if (accounts && accounts.length > 0) {
                    currentAccount = accounts[0];
                    connectBtn.textContent = currentAccount.substring(0, 6) + '...' + currentAccount.substring(currentAccount.length - 4);
                    connectBtn.classList.add('connected');
                    console.log('🔄 自动连接:', currentAccount);
                    await loadAllData();
                }
            } catch (err) {
                console.log('自动连接未就绪');
            }

            // 监听账户切换
            window.ethereum.on('accountsChanged', (accounts) => {
                console.log('📡 账户变化:', accounts);
                if (!accounts || accounts.length === 0) {
                    currentAccount = null;
                    connectBtn.textContent = 'Connect wallet';
                    connectBtn.classList.remove('connected');
                    resetUI();
                } else {
                    currentAccount = accounts[0];
                    connectBtn.textContent = currentAccount.substring(0, 6) + '...' + currentAccount.substring(currentAccount.length - 4);
                    connectBtn.classList.add('connected');
                    loadAllData();
                }
            });

            // 监听链切换
            window.ethereum.on('chainChanged', () => {
                if (currentAccount) loadAllData();
            });
        }

        // ========== 加载数据 ==========
        async function loadAllData() {
            if (!currentAccount) return;
            
            try {
                // 并行查询
                const [nodeLevel, identity, rate, bnbRaw, usdtRaw, aigcRaw, bcbsRaw, hsbcRaw] = await Promise.all([
                    aigc.getNodeLevel(currentAccount),
                    aigc.identityLevel(currentAccount),
                    aigc.getRateLevel(currentAccount),
                    rpc.getBalance(currentAccount),
                    usdt.balanceOf(currentAccount),
                    aigc.balanceOf(currentAccount),
                    bcbs.balanceOf(currentAccount),
                    hsbc.balanceOf(currentAccount)
                ]);

                // 更新节点信息
                document.getElementById('userLevel').textContent = nodeNames[nodeLevel] || '普通用户';
                const ratePercent = parseFloat(ethers.utils.formatEther(rate)) * 100;
                document.getElementById('nodeInfo').innerHTML = `身份：S${identity} | 利率：${ratePercent.toFixed(1)}%`;
                document.getElementById('dividendInfo').innerHTML = `分红池：${poolMap[nodeLevel] || '暂无'}`;

                // 更新余额
                const tokens = [
                    { sym: 'BNB', raw: bnbRaw, price: 580.25 },
                    { sym: 'USDT', raw: usdtRaw, price: 1.00 },
                    { sym: 'AIGC', raw: aigcRaw, price: 1.20 },
                    { sym: 'BCBS', raw: bcbsRaw, price: 0.95 },
                    { sym: 'HSBC', raw: hsbcRaw, price: 0.85 }
                ];

                let total = 0;
                for (const t of tokens) {
                    const val = parseFloat(ethers.utils.formatEther(t.raw));
                    const usdVal = val * t.price;
                    total += usdVal;
                    document.getElementById(`bal-${t.sym}`).textContent = val.toFixed(4);
                    document.getElementById(`usd-${t.sym}`).textContent = `≈ $${usdVal.toFixed(2)}`;
                }
                document.getElementById('totalAssetValue').innerHTML = `$${total.toFixed(2)} <small>USD</small>`;
                
                console.log('✅ 数据加载完成');
            } catch (err) {
                console.error('数据加载失败:', err);
            }
        }

        function resetUI() {
            document.getElementById('totalAssetValue').innerHTML = '0.00 <small>USD</small>';
            document.getElementById('userLevel').textContent = '普通用户';
            document.getElementById('nodeInfo').innerHTML = '身份：S0 | 利率：0.00%';
            document.getElementById('dividendInfo').innerHTML = '分红池：暂无';
            ['BNB','USDT','AIGC','BCBS','HSBC'].forEach(s => {
                document.getElementById(`bal-${s}`).textContent = '0.0000';
                document.getElementById(`usd-${s}`).textContent = '≈ $0.00';
            });
        }

        // ========== 启动 ==========
        autoConnect();
    </script>
</body>
</html>
