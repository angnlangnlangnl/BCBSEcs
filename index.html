<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资产 - SpaceX Web3</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            color: #ffffff;
        }
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 170, 0, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 170, 0, 0.05) 0%, transparent 20%);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(to right, #aaa, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-area span { margin-left: 5px; }
        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid #333;
            color: #aaa;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .connect-btn {
            background: transparent;
            border: 1px solid #f90;
            color: #f90;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.1);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .connect-btn.connected {
            background: rgba(255, 153, 0, 0.2);
            border-color: #ffaa00;
            color: #ffd700;
        }

        /* 面板与发光边框 */
        .panel {
            background: rgba(20, 20, 30, 0.6);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255, 170, 0, 0.02);
        }
        .panel::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 12px;
            padding: 1px;
            background: linear-gradient(135deg, #f90, transparent, #f90);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 角色等级与总资产卡片 */
        .profile-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 15px;
        }
        .profile-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f3a900, #ffd700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #111;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.3);
        }
        .level-badge {
            background: #f90;
            color: #111;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 4px;
        }
        .total-value {
            text-align: right;
        }
        .total-label {
            font-size: 12px;
            color: #888;
        }
        .total-amount {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }
        .total-amount small {
            font-size: 14px;
            font-weight: 400;
            color: #aaa;
        }

        /* 资产卡片列表 */
        .asset-card {
            background: rgba(30, 30, 40, 0.5);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .asset-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #555, #333);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .asset-info {
            flex: 1;
        }
        .asset-name {
            font-size: 15px;
            color: #fff;
            font-weight: 600;
        }
        .asset-price {
            font-size: 12px;
            color: #aaa;
        }
        .asset-right {
            text-align: right;
        }
        .asset-balance {
            font-size: 15px;
            color: #fff;
            font-weight: 600;
        }
        .asset-usd-value {
            font-size: 12px;
            color: #f90;
        }

        /* 底部导航 */
        .bottom-nav {
            flex-shrink: 0;
            background: rgba(15, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 153, 0, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            margin: 0 15px 15px 15px;
            position: relative;
        }
        .bottom-nav::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, #f90, transparent, #f90);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 11px;
            gap: 4px;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .nav-item .icon { font-size: 20px; }
        .nav-item.active {
            color: #f90;
            position: relative;
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #f90;
            border-radius: 5px;
            box-shadow: 0 0 10px #f90;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <!-- 头部 -->
            <div class="header">
                <div class="logo-area">🚀 <span>SPACEX</span></div>
                <div class="header-controls">
                    <button class="lang-btn">🇺🇸 EN ⌄</button>
                    <button id="connectWalletBtn" class="connect-btn">Connect wallet</button>
                </div>
            </div>

            <!-- 第一卡片：角色等级 + 总资产价值 -->
            <div class="panel profile-panel">
                <div class="profile-left">
                    <div class="avatar-circle">👤</div>
                    <div>
                        <div class="level-badge" id="userLevel">--</div>
                    </div>
                </div>
                <div class="total-value">
                    <div class="total-label">总资产价值</div>
                    <div class="total-amount" id="totalAssetValue">-- <small>USD</small></div>
                </div>
            </div>

            <!-- 资产卡片列表容器 -->
            <div id="assetListContainer">
                <!-- 动态填充资产卡片 -->
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item active"><span class="icon">💼</span><span>资产</span></a>
            <a href="stake.html" class="nav-item"><span class="icon">🔒</span><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><span class="icon">💧</span><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><span class="icon">📨</span><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><span class="icon">🌐</span><span>生态</span></a>
        </div>
    </div>

    <script>
        let provider, signer, currentAccount;
        const connectBtn = document.getElementById('connectWalletBtn');
        const totalAssetValueEl = document.getElementById('totalAssetValue');
        const userLevelEl = document.getElementById('userLevel');

        // 资产列表：BNB, USDT, AIGC, BCBS, HSBC
        const assetDefinitions = [
            { icon: '💛', name: 'BNB',   price: 580.25 },
            { icon: '💵', name: 'USDT',  price: 1.00 },
            { icon: '🟡', name: 'AIGC',  price: 1.20 },
            { icon: '🏦', name: 'BCBS',  price: 0.95 },
            { icon: '🔷', name: 'HSBC',  price: 0.85 }
        ];

        async function initWallet() {
            if (typeof window.ethereum !== 'undefined') {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                try {
                    const accounts = await provider.listAccounts();
                    if (accounts.length > 0) {
                        currentAccount = accounts[0];
                        signer = provider.getSigner();
                        updateUIForConnected(currentAccount);
                    } else {
                        setDisconnectedUI();
                    }
                } catch (err) {
                    setDisconnectedUI();
                }
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                window.ethereum.on('chainChanged', () => window.location.reload());
            } else {
                connectBtn.textContent = 'No Wallet';
                connectBtn.disabled = true;
            }
            // 无论是否连接，都渲染资产卡片结构
            renderAssets();
        }

        function setDisconnectedUI() {
            connectBtn.textContent = 'Connect wallet';
            connectBtn.classList.remove('connected');
            connectBtn.onclick = connectWallet;
        }

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('请安装 MetaMask 或使用内置 Web3 浏览器！');
                return;
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                updateUIForConnected(currentAccount);
                renderAssets();
            } catch (err) {
                console.error('用户拒绝连接或发生错误:', err);
            }
        }

        function updateUIForConnected(account) {
            const shortAddr = `${account.substring(0, 6)}...${account.substring(account.length - 4)}`;
            connectBtn.textContent = shortAddr;
            connectBtn.classList.add('connected');
            connectBtn.onclick = disconnectWallet;
        }

        function disconnectWallet() {
            currentAccount = null;
            signer = null;
            setDisconnectedUI();
            renderAssets(); // 重新渲染，显示 --
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length === 0) {
                disconnectWallet();
            } else {
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                updateUIForConnected(currentAccount);
                renderAssets();
            }
        }

        // 模拟从合约获取余额（连接后返回模拟数据，否则返回 null）
        async function fetchAssetBalances() {
            if (!currentAccount || !signer) {
                // 未连接钱包，返回 null 表示数据不可用
                return null;
            }
            // 这里模拟异步获取，实际替换为合约调用
            return {
                BNB: 2.35,
                USDT: 1520.00,
                AIGC: 1250.50,
                BCBS: 800.00,
                HSBC: 200.00
            };
        }

        // 渲染资产卡片，数据不可用时用 --
        async function renderAssets() {
            const container = document.getElementById('assetListContainer');
            const balances = await fetchAssetBalances();
            let totalValue = 0;
            let hasData = balances !== null;
            let html = '';

            for (const def of assetDefinitions) {
                const balance = hasData ? balances[def.name] : null;
                const usdValue = (balance !== null && balance !== undefined) ? balance * def.price : null;
                if (usdValue !== null) totalValue += usdValue;

                const balanceText = (balance !== null && balance !== undefined) ? balance.toLocaleString() : '--';
                const usdText = (usdValue !== null && usdValue !== undefined) ? `≈ $${usdValue.toFixed(2)}` : '--';

                html += `
                    <div class="asset-card">
                        <div class="asset-icon">${def.icon}</div>
                        <div class="asset-info">
                            <div class="asset-name">${def.name}</div>
                            <div class="asset-price">$${def.price.toFixed(2)}</div>
                        </div>
                        <div class="asset-right">
                            <div class="asset-balance">${balanceText}</div>
                            <div class="asset-usd-value">${usdText}</div>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;

            // 更新总资产
            if (hasData) {
                totalAssetValueEl.innerHTML = `$${totalValue.toFixed(2)} <small>USD</small>`;
                // 等级计算
                const level = Math.floor(totalValue / 1000) + 1;
                userLevelEl.textContent = `Lv. ${level}`;
            } else {
                totalAssetValueEl.innerHTML = `-- <small>USD</small>`;
                userLevelEl.textContent = '--';
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', initWallet);
    </script>
</body>
</html>
