<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>邀请 - SpaceX Web3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: #ffffff; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background: radial-gradient(circle at center, #111 0%, #030303 100%); background-image: radial-gradient(circle at 10% 20%, rgba(255,170,0,0.05) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(255,170,0,0.05) 0%, transparent 20%); border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: bold; background: linear-gradient(to right, #aaa, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .connect-btn { background: transparent; border: 1px solid #f90; color: #f90; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 0 10px rgba(255,153,0,0.1); transition: all 0.2s; white-space: nowrap; }
        .connect-btn.connected { background: rgba(255,153,0,0.2); border-color: #ffaa00; color: #ffd700; }
        .panel { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; box-shadow: inset 0 0 20px rgba(255,170,0,0.02); }
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 12px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .page-title { font-size: 24px; color: #f90; text-align: center; margin: 10px 0 20px; }
        .process-panel { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .process-flow { display: flex; align-items: center; justify-content: space-around; }
        .process-step { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #ccc; font-size: 12px; }
        .process-step .step-icon { font-size: 28px; }
        .process-arrow { color: #f90; font-size: 22px; margin: 0 -5px; }
        .airdrop-card { background: linear-gradient(135deg, rgba(255,170,0,0.15), rgba(255,170,0,0.02)); border: 1px solid rgba(255,170,0,0.3); }
        .airdrop-amount-box { background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 6px; padding: 12px; text-align: center; color: #ffffff; font-size: 24px; font-weight: 700; margin: 8px 0 12px 0; }
        .airdrop-btn { width: 100%; background: linear-gradient(90deg, #ff6600, #ff9900); border: none; border-radius: 8px; padding: 12px; font-weight: bold; color: #fff; cursor: pointer; }
        .tab-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(30,30,40,0.8); border: 1px solid #444; border-radius: 8px; color: #aaa; font-size: 14px; cursor: pointer; text-align: center; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,170,0,0.05)); border-color: #f90; color: #f90; }
        .record-item { background: rgba(30,30,40,0.5); border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .header-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stats-row { display: flex; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 0 10px; }
        .progress-area { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; }
        .progress-track { height: 12px; background: #1a1a2e; border-radius: 6px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: repeating-linear-gradient(45deg, #ff8c00, #ff8c00 10px, #ffaa00 10px, #ffaa00 20px); }
        .bottom-nav { flex-shrink: 0; background: rgba(15,15,30,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,153,0,0.15); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 12px 0; margin: 0 15px 15px 15px; position: relative; }
        .bottom-nav::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; transition: all 0.2s ease; text-decoration: none; }
        .nav-item .icon { font-size: 20px; }
        .nav-item.active { color: #f90; position: relative; }
        .nav-item.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: #f90; border-radius: 5px; box-shadow: 0 0 10px #f90; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area">🚀 <span>SPACEX</span></div>
                <div class="header-controls">
                    <button class="lang-btn">🇺🇸 EN ⌄</button>
                    <button id="connectWalletBtn" class="connect-btn">Connect wallet</button>
                </div>
            </div>
            <div class="page-title">📨 邀请好友</div>
            <!-- 空投卡片 -->
            <div class="panel airdrop-card">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                    <span style="font-size:36px;">🎁</span>
                    <div><div style="color:#f90;font-size:18px;font-weight:700;">限量空投活动</div><div style="color:#ccc;font-size:12px;">新用户专享，推荐好友可奖励50HSBC</div></div>
                </div>
                <div class="airdrop-amount-box">已到账100 HSBC</div>
                <button class="airdrop-btn" id="claimAirdropBtn">立即领取</button>
            </div>
            <!-- 交易考核概览 -->
            <div class="panel">
                <div class="header-row">
                    <div><span style="color:#888;">📅 最大区总业绩</span></div>
                    <div><span style="color:#888;">📅 最小区总业绩</span></div>
                </div>
                <div class="stats-row">
                    <div class="stat-box"><div style="color:#888;font-size:11px;">累计交易量($)</div><div style="font-size:24px;">0.00</div></div>
                    <div class="stat-box"><div style="color:#888;font-size:11px;">累计交易量($)</div><div style="font-size:24px;">0.00</div></div>
                </div>
                <div class="progress-area">
                    <div style="display:flex;justify-content:space-between;font-size:13px;"><span>考核进度</span><span style="color:#f90;">0.00%</span></div>
                    <div class="progress-track"><div class="progress-fill" style="width:0%;"></div></div>
                    <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;"><span>个人持币目标: $0.00</span><span>未完成: $0.00</span></div>
                </div>
            </div>
            <!-- 推广流程 -->
            <div class="panel process-panel">
                <div class="process-flow">
                    <div class="process-step"><span class="step-icon">👤</span><span>老用户</span></div>
                    <span class="process-arrow">→</span>
                    <div class="process-step"><span class="step-icon">🔄</span><span>转AIGC</span></div>
                    <span class="process-arrow">→</span>
                    <div class="process-step"><span class="step-icon">🌱</span><span>新用户</span></div>
                    <span class="process-arrow">→</span>
                    <div class="process-step"><span class="step-icon">✅</span><span>绑定成功</span></div>
                </div>
            </div>
            <!-- 记录面板 -->
            <div class="panel">
                <div class="tab-switch">
                    <div class="tab-btn" data-tab="invite">邀请记录</div>
                    <div class="tab-btn active" data-tab="claim">领取记录</div>
                </div>
                <div id="recordListContainer"></div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="icon">💼</span><span>资产</span></a>
            <a href="stake.html" class="nav-item"><span class="icon">🔒</span><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><span class="icon">💧</span><span>流动性</span></a>
            <a href="invite.html" class="nav-item active"><span class="icon">📨</span><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><span class="icon">🌐</span><span>生态</span></a>
        </div>
    </div>
    <script>
        let provider, signer, currentAccount;
        function updateUIForConnected(acc) {
            const btn = document.getElementById('connectWalletBtn');
            btn.textContent = `${acc.substring(0,6)}...${acc.substring(acc.length-4)}`;
            btn.classList.add('connected');
            btn.onclick = disconnectWallet;
        }
        function setDisconnectedUI() {
            const btn = document.getElementById('connectWalletBtn');
            btn.textContent = 'Connect wallet';
            btn.classList.remove('connected');
            btn.onclick = connectWallet;
        }
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') { alert('请安装 MetaMask！'); return; }
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            currentAccount = accounts[0];
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            updateUIForConnected(currentAccount);
            loadClaimRecords();
        }
        function disconnectWallet() { currentAccount = null; signer = null; setDisconnectedUI(); }
        function handleAccountsChanged(accounts) {
            if (accounts.length === 0) disconnectWallet();
            else {
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                updateUIForConnected(currentAccount);
                loadClaimRecords();
            }
        }
        function loadClaimRecords() {
            const container = document.getElementById('recordListContainer');
            if (!currentAccount) { container.innerHTML = '<div style="text-align:center;color:#888;">请先连接钱包</div>'; return; }
            container.innerHTML = '<div class="record-item">模拟记录</div>';
        }
        async function initAfterEthers() {
            if (typeof window.ethereum !== 'undefined') {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                try {
                    const accounts = await provider.listAccounts();
                    if (accounts.length > 0) {
                        currentAccount = accounts[0];
                        signer = provider.getSigner();
                        updateUIForConnected(currentAccount);
                        loadClaimRecords();
                    } else setDisconnectedUI();
                } catch (e) { setDisconnectedUI(); }
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                window.ethereum.on('chainChanged', () => window.location.reload());
            }
            document.getElementById('claimAirdropBtn').addEventListener('click', () => {
                if (!currentAccount) { alert('请先连接钱包！'); return; }
                alert('领取成功！（模拟）');
            });
        }
    </script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" onload="initAfterEthers()"></script>
</body>
</html>
