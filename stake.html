<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>质押测试</title></head>
<body>
    <button id="connectBtn">连接钱包</button>
    <button id="loadBtn">加载订单</button>
    <div id="result" style="margin-top:20px;font-size:14px;"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        const BCBS_ADDRESS = '0xC2ED87266c9F35eeb6715624264A8163A361FCd7';
        const STAKE_ABI = [
            "function getUserStakeIds(address) view returns (uint256[])",
            "function getStakeInfo(uint256) view returns (tuple(uint256,address,uint8,uint256,uint256,uint8,bool,uint256,uint256))",
            "function getPendingInterest(uint256) view returns (uint256)"
        ];
        
        let provider, signer, account, contract;
        
        document.getElementById('connectBtn').onclick = async function() {
            if (!window.ethereum) return alert('请安装 MetaMask');
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            account = accounts[0];
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(BCBS_ADDRESS, STAKE_ABI, signer);
            document.getElementById('result').innerHTML = `✅ 已连接: ${account.substring(0,6)}...`;
        };
        
        document.getElementById('loadBtn').onclick = async function() {
            if (!contract) return alert('请先连接钱包');
            const container = document.getElementById('result');
            container.innerHTML = '⏳ 加载中...';
            try {
                // 1. 获取质押 ID
                const ids = await contract.getUserStakeIds(account);
                container.innerHTML += `<br>📋 质押 ID: [${ids}]`;
                if (ids.length === 0) {
                    container.innerHTML += '<br>📭 暂无质押记录';
                    return;
                }
                // 2. 遍历查询
                for (let id of ids) {
                    const idNum = id.toNumber ? id.toNumber() : Number(id);
                    const stake = await contract.getStakeInfo(idNum);
                    const pending = await contract.getPendingInterest(idNum);
                    container.innerHTML += `<br>📦 订单 #${idNum}:`;
                    container.innerHTML += `<br>  tokenType: ${stake[2]} (${stake[2] === 0 ? 'AIGC' : 'USDT'})`;
                    container.innerHTML += `<br>  amount: ${ethers.utils.formatUnits(stake[3], 18)}`;
                    container.innerHTML += `<br>  startTime: ${new Date(stake[4] * 1000).toLocaleString()}`;
                    container.innerHTML += `<br>  period: ${stake[5]}`;
                    container.innerHTML += `<br>  redeemed: ${stake[6]}`;
                    container.innerHTML += `<br>  pending: ${ethers.utils.formatUnits(pending, 18)} BCBS`;
                    container.innerHTML += `<br>  ⚠️ 使用数组索引访问成功`;
                }
            } catch(e) {
                container.innerHTML = `❌ 错误: ${e.message}`;
                console.error(e);
            }
        };
    </script>
</body>
</html>
