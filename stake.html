<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>质押 - BCBS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: #ffffff; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background: radial-gradient(circle at center, #111 0%, #030303 100%); border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: bold; background: linear-gradient(to right, #aaa, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area img { width: 24px; height: 24px; margin-right: 5px; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .connect-btn { background: transparent; border: 1px solid #f90; color: #f90; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 0 10px rgba(255,153,0,0.1); transition: all 0.2s; white-space: nowrap; }
        .connect-btn.connected { background: rgba(255,153,0,0.2); border-color: #ffaa00; color: #ffd700; }
        .connect-btn:disabled, .stake-btn:disabled, .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .panel { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; box-shadow: inset 0 0 20px rgba(255,170,0,0.02); }
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 12px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .page-title { font-size: 24px; color: #f90; text-align: center; margin: 10px 0 20px; }
        .balance-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 0; padding: 8px 12px; position: relative; }
        .balance-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 10px; position: relative; }
        .balance-item:first-child { border-right: 1px solid rgba(255,255,255,0.08); }
        .balance-icon { width: 28px; height: 28px; margin-bottom: 2px; }
        .balance-icon img { width: 100%; height: 100%; object-fit: contain; }
        .balance-label { font-size: 12px; color: #6a8aae; margin-bottom: 2px; font-weight: 500; }
        .balance-value { font-size: 14px; font-weight: 700; color: #f90; text-align: center; word-break: break-all; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(30,30,40,0.8); border: 1px solid #444; border-radius: 8px; color: #aaa; font-size: 14px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,170,0,0.05)); border-color: #f90; color: #f90; box-shadow: 0 0 10px rgba(255,170,0,0.2); }
        .amount-input-wrapper { background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .amount-input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; }
        .balance-info { display: flex; justify-content: space-between; color: #aaa; font-size: 12px; margin-bottom: 5px; }
        .balance-info .max-btn { color: #f90; cursor: pointer; }
        .period-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .period-btn { padding: 10px 5px; background: rgba(30,30,40,0.8); border: 1px solid #444; border-radius: 8px; color: #aaa; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .period-btn.active { background: linear-gradient(135deg, rgba(255,170,0,0.3), rgba(255,170,0,0.1)); border-color: #f90; color: #f90; box-shadow: 0 0 10px rgba(255,170,0,0.2); }
        .period-btn .rate-label { display: block; font-size: 10px; color: #f90; margin-top: 3px; }
        .reward-preview { background: rgba(255,170,0,0.05); border-radius: 8px; padding: 10px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .reward-preview span { color: #ccc; font-size: 13px; }
        .reward-preview strong { color: #f90; font-size: 16px; }
        .stake-btn { width: 100%; background: linear-gradient(90deg, #f4a200, #ffd700); border: none; border-radius: 8px; padding: 14px; font-weight: bold; color: #111; cursor: pointer; box-shadow: 0 4px 15px rgba(255,170,0,0.3); font-size: 16px; }
        .order-list-title { font-size: 16px; color: #f90; margin-bottom: 12px; }
        .stake-card { background: rgba(16, 26, 46, 0.7); border: 1px solid rgba(0, 180, 255, 0.12); border-radius: 16px; padding: 16px; margin-bottom: 14px; backdrop-filter: blur(8px); }
        .stake-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stake-id { font-weight: 600; color: #c8d6e5; font-size: 17px; }
        .stake-status { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-active { background: rgba(255, 215, 0, 0.15); color: #ffd93d; }
        .status-ready { background: rgba(0, 230, 118, 0.15); color: #7bed9f; }
        .status-redeemed { background: rgba(100, 100, 100, 0.2); color: #8a8a8a; }
        .status-error { background: rgba(255, 71, 87, 0.12); color: #ff6b6b; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .info-row .label { color: #6a8aae; font-size: 13px; }
        .info-row .value { color: #c8d6e5; font-size: 13px; font-weight: 500; }
        .info-row .rate { color: #00d4ff; }
        .stake-interest { background: rgba(0, 0, 0, 0.2); border-radius: 10px; padding: 10px 14px; margin: 10px 0; }
        .stake-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .stake-actions .btn { flex: 1; padding: 9px 10px; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; min-width: 90px; font-size: 12px; transition: all 0.2s; }
        .btn-primary { background: rgba(0, 180, 255, 0.15); color: #00d4ff; }
        .btn-primary:hover:not(:disabled) { background: rgba(0, 180, 255, 0.25); }
        .btn-success { background: rgba(0, 230, 118, 0.12); color: #7bed9f; }
        .btn-success:hover:not(:disabled) { background: rgba(0, 230, 118, 0.2); }
        .btn-danger { background: rgba(255, 71, 87, 0.12); color: #ff6b6b; }
        .btn-danger:hover:not(:disabled) { background: rgba(255, 71, 87, 0.2); }
        .btn-retry { background: rgba(255, 170, 0, 0.12); color: #f90; }
        .btn-retry:hover { background: rgba(255, 170, 0, 0.25); }
        .countdown { color: #ffd93d; font-weight: 600; }
        .pending-interest { color: #ffd93d; font-weight: 600; }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-row { display: flex; justify-content: space-between; padding: 8px 0; align-items: center; }
        .skeleton-label { width: 55px; height: 14px; }
        .skeleton-value { width: 90px; height: 14px; }
        .skeleton-interest { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px 14px; margin: 10px 0; }
        .skeleton-btn { width: 100%; height: 36px; border-radius: 10px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,170,0,0.2); border-top: 3px solid #f90; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bottom-nav { flex-shrink: 0; background: rgba(15,15,30,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,153,0,0.15); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 12px 0; margin: 0 15px 15px 15px; position: relative; }
        .bottom-nav::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; transition: all 0.2s ease; text-decoration: none; }
        .nav-item .nav-icon { width: 20px; height: 20px; object-fit: contain; }
        .nav-item.active { color: #f90; position: relative; }
        .nav-item.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: #f90; border-radius: 5px; box-shadow: 0 0 10px #f90; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/aigc.png" alt="AIGC"><span>BCBS</span></div>
                <div class="header-controls">
                    <button class="lang-btn">🇺🇸 EN ⌄</button>
                    <button id="connectWalletBtn" class="connect-btn">Connect wallet</button>
                </div>
            </div>
            <div class="page-title">🔒 质押挖矿</div>

            <div class="panel balance-panel">
                <div class="balance-item">
                    <div class="balance-icon"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/aigc.png" alt="AIGC"></div>
                    <div class="balance-label">AIGC</div>
                    <div class="balance-value" id="aigcBalance">--</div>
                </div>
                <div class="balance-item">
                    <div class="balance-icon"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/usdt.png" alt="USDT"></div>
                    <div class="balance-label">USDT</div>
                    <div class="balance-value" id="usdtBalance">--</div>
                </div>
            </div>

            <div class="panel">
                <div class="tab-container">
                    <div class="tab-btn active" data-coin="AIGC">AIGC</div>
                    <div class="tab-btn" data-coin="USDT">USDT</div>
                </div>
                <div class="balance-info">
                    <span>可质押余额: <span id="availableBalance">0.00000</span> <span id="coinLabel">AIGC</span></span>
                    <span class="max-btn" id="maxBtn">MAX</span>
                </div>
                <div class="amount-input-wrapper">
                    <input type="number" id="stakeAmount" placeholder="0.00000" value="0">
                    <span id="currencyDisplay" style="color:#f90;font-size:14px;font-weight:600;">AIGC</span>
                </div>
                <div style="color:#ccc;font-size:13px;margin-bottom:8px;">选择质押周期</div>
                <div class="period-grid">
                    <div class="period-btn active" data-period="0">7天<span class="rate-label">日利率0.8%</span></div>
                    <div class="period-btn" data-period="1">35天<span class="rate-label">日利率1.3%</span></div>
                    <div class="period-btn" data-period="2">180天<span class="rate-label">日利率1.8%</span></div>
                    <div class="period-btn" data-period="3">360天<span class="rate-label">日利率2.1%</span></div>
                    <div class="period-btn" data-period="4">540天<span class="rate-label">日利率2.3%</span></div>
                    <div class="period-btn" data-period="5">720天<span class="rate-label">日利率2.6%</span></div>
                </div>
                <div class="reward-preview">
                    <span>预计可获得利息</span>
                    <strong id="estimatedReward">0.00000 BCBS</strong>
                </div>
                <button class="stake-btn" id="stakeSubmitBtn">立即质押</button>
            </div>

            <div class="panel">
                <div class="order-list-title">📋 我的质押订单</div>
                <div id="orderListContainer">
                    <div class="stake-card">
                        <div class="stake-header"><div class="skeleton" style="width:40px;height:17px;"></div><div class="skeleton" style="width:70px;height:24px;border-radius:20px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:120px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:50px;"></div></div>
                        <div class="skeleton-interest"><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:80px;"></div></div></div>
                        <div class="stake-actions"><div class="skeleton skeleton-btn"></div><div class="skeleton skeleton-btn"></div></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/index.icon.png" alt="资产"><span>资产</span></a>
            <a href="stake.html" class="nav-item active"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/stake.icon.png" alt="质押"><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/liquidity.icon.png" alt="流动性"><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/invite.icon.png" alt="邀请"><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/ecosystem.icon.png" alt="生态"><span>生态</span></a>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
    </div>

    <script>
        const AIGC_ADDRESS = '0xdB5A187FE04A249AC2F2E821b72b771d01b2C0e8';
        const BCBS_ADDRESS = '0x9ECcC2B06582Ca14509CAd41F1d5204979Ce6995';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';

        const ERC20_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function decimals() view returns (uint8)",
            "function approve(address,uint256) returns (bool)",
            "function allowance(address,address) view returns (uint256)"
        ];

        const STAKE_ABI = [
            "function stakeAIGC(uint256,uint8) returns (bool)",
            "function stakeUSDT(uint256,uint8) returns (bool)",
            "function getUserStakeIds(address) view returns (uint256[])",
            "function getStakeInfo(uint256) view returns (tuple(uint256 id, address user, uint8 tokenType, uint256 amount, uint256 startTime, uint8 period, bool redeemed, uint256 lastClaimTime, uint256 accumulatedClaimed))",
            "function getPendingInterest(uint256) view returns (uint256)",
            "function getBnbRequiredForClaim(uint256) view returns (uint256)",
            "function claimInterest(uint256) payable",
            "function redeemPrincipal(uint256) returns (bool)",
            "function redeemPrincipalEarly(uint256) returns (bool)",
            "function daySeconds() view returns (uint256)"
        ];

        let provider, signer, currentAccount;
        let stakeContract, aigcContract, usdtContract;
        const connectBtn = document.getElementById('connectWalletBtn');
        const stakeBtn = document.getElementById('stakeSubmitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const periodDays = [7, 35, 180, 360, 540, 720];
        const dailyRates = [0.008, 0.013, 0.018, 0.021, 0.023, 0.026];
        let currentCoin = 'AIGC', currentPeriod = 0, countdownTimer = null;
        let cachedDaySeconds = 86400;

        function showLoading() { loadingOverlay.style.display = 'flex'; }
        function hideLoading() { loadingOverlay.style.display = 'none'; }

        function formatTokenAmount(amount, decimals = 18, precision = 5) {
            if (!amount || amount === '0' || amount === 0) return '0.' + '0'.repeat(precision);
            try {
                if (typeof amount === 'object' && amount._isBigNumber) return parseFloat(ethers.utils.formatUnits(amount, decimals)).toFixed(precision);
                return parseFloat(amount).toFixed(precision);
            } catch(e) { return '0.' + '0'.repeat(precision); }
        }

        function formatTimestamp(timestamp) {
            if (!timestamp || timestamp === '0' || timestamp === 0) return '--';
            try {
                const ts = typeof timestamp === 'object' ? timestamp.toNumber() : parseInt(timestamp);
                return new Date(ts * 1000).toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
            } catch(e) { return '--'; }
        }

        function formatRemainingTime(endTime) {
            const now = Math.floor(Date.now()/1000);
            const remaining = endTime - now;
            if (remaining <= 0) return '已到期 ✅';
            const days = Math.floor(remaining/86400);
            const hours = Math.floor((remaining%86400)/3600);
            const minutes = Math.floor((remaining%3600)/60);
            if (days > 0) return `${days}天${hours}小时${minutes}分钟`;
            if (hours > 0) return `${hours}小时${minutes}分钟`;
            return `${minutes}分钟`;
        }

        function getPeriodName(period) {
            const map = { 0:{name:'7 天',test:'35 分钟'},1:{name:'35 天',test:'175 分钟'},2:{name:'180 天',test:'15 小时'},3:{name:'360 天',test:'30 小时'},4:{name:'540 天',test:'45 小时'},5:{name:'720 天',test:'60 小时'} };
            return map[period]||{name:'未知',test:'--'};
        }

        function getDailyRate(period) { const map = {0:'0.8%',1:'1.3%',2:'1.8%',3:'2.1%',4:'2.3%',5:'2.6%'}; return map[period]||'--'; }
        function getStatusLabel(redeemed, endTime) {
            if (redeemed) return { text:'已赎回 ✅', cls:'status-redeemed' };
            const now = Math.floor(Date.now()/1000);
            if (now >= endTime) return { text:'可赎回 🟢', cls:'status-ready' };
            return { text:'⏳ 质押中', cls:'status-active' };
        }

        function initContracts() {
            if (provider && signer) {
                aigcContract = new ethers.Contract(AIGC_ADDRESS, ERC20_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, ERC20_ABI, signer);
                stakeContract = new ethers.Contract(BCBS_ADDRESS, STAKE_ABI, signer);
            }
        }

        async function fetchChainParams() {
            if (!stakeContract) return;
            try { const ds = await stakeContract.daySeconds(); if (ds && ds.gt(0)) cachedDaySeconds = ds.toNumber(); } catch (e) { cachedDaySeconds = 86400; }
        }

        async function getDecimals(contract) { try { return await contract.decimals(); } catch (e) { return 18; } }

        async function updateBalance() {
            try {
                const contract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
                if (!contract || !currentAccount) { document.getElementById('availableBalance').textContent = '0.00000'; return; }
                const balance = await contract.balanceOf(currentAccount);
                const decimals = await getDecimals(contract);
                document.getElementById('availableBalance').textContent = parseFloat(ethers.utils.formatUnits(balance, decimals)).toFixed(5);
            } catch (e) { document.getElementById('availableBalance').textContent = '0.00000'; }
        }

        async function updateAllBalances() {
            if (!currentAccount || !aigcContract || !usdtContract) return;
            try {
                const [aigcBal, usdtBal, aigcDec, usdtDec] = await Promise.all([aigcContract.balanceOf(currentAccount), usdtContract.balanceOf(currentAccount), getDecimals(aigcContract), getDecimals(usdtContract)]);
                document.getElementById('aigcBalance').textContent = parseFloat(ethers.utils.formatUnits(aigcBal, aigcDec)).toFixed(5);
                document.getElementById('usdtBalance').textContent = parseFloat(ethers.utils.formatUnits(usdtBal, usdtDec)).toFixed(5);
            } catch (e) {}
        }

        function updateRewardPreview() {
            const amount = parseFloat(document.getElementById('stakeAmount').value) || 0;
            document.getElementById('estimatedReward').textContent = (amount * dailyRates[currentPeriod] * periodDays[currentPeriod]).toFixed(5) + ' BCBS';
        }

        async function refreshAll() {
            if (!currentAccount) return;
            await Promise.all([updateBalance(), updateAllBalances(), loadOrders()]);
            updateRewardPreview();
        }

        async function loadOrders() {
            const container = document.getElementById('orderListContainer');
            if (!currentAccount || !stakeContract) { container.innerHTML = renderSkeleton(); return; }
            container.innerHTML = renderSkeleton();
            try {
                const ids = await stakeContract.getUserStakeIds(currentAccount);
                if (!ids || ids.length === 0) { container.innerHTML = renderEmptyCard(); return; }
                let html = '', successCount = 0, failedCount = 0;
                for (const id of ids) { try { html += await loadSingleOrder(id); successCount++; } catch (e) { failedCount++; html += renderErrorCard(id, e); } }
                if (failedCount > 0) html += `<div style="color:#f90;text-align:center;padding:10px;font-size:12px;background:rgba(255,170,0,0.05);border-radius:8px;margin-top:8px;">✅ ${successCount} 正常 | ❌ ${failedCount} 失败</div>`;
                container.innerHTML = html; startCountdown(); bindOrderActions();
            } catch (e) { container.innerHTML = renderGlobalErrorCard(e); }
        }

        async function loadSingleOrder(id) {
            const result = await stakeContract.getStakeInfo(id);
            const stakeId = (result.id || result[0]).toString();
            const tokenType = result.tokenType !== undefined ? result.tokenType : result[2];
            const amount = result.amount || result[3];
            const startTime = (result.startTime || result[4]).toString();
            const period = result.period !== undefined ? result.period : result[5];
            const redeemed = result.redeemed !== undefined ? result.redeemed : result[6];
            const accumulatedClaimed = result.accumulatedClaimed || result[8];
            let pendingDisplay = '0.00000 BCBS', pendingValue = 0;
            try { const pending = await stakeContract.getPendingInterest(id); pendingValue = pending ? parseFloat(ethers.utils.formatUnits(pending, 18)) : 0; pendingDisplay = pendingValue.toFixed(5) + ' BCBS'; } catch (e) { pendingDisplay = '⚠️ 暂不可用'; }
            const tokenName = tokenType === 0 ? 'AIGC' : 'USDT';
            let decimals = 18; try { decimals = await getDecimals(tokenType === 0 ? aigcContract : usdtContract); } catch (e) {}
            const periodInfo = getPeriodName(Number(period));
            const endTime = parseInt(startTime) + periodDays[Number(period)] * cachedDaySeconds;
            const status = getStatusLabel(redeemed, endTime);
            return `<div class="stake-card" data-stake-id="${stakeId}"><div class="stake-header"><span class="stake-id"># ${stakeId}</span><span class="stake-status ${status.cls}">${status.text}</span></div><div class="info-row"><span class="label">质押资产</span><span class="value">${tokenName}</span></div><div class="info-row"><span class="label">质押数量</span><span class="value">${formatTokenAmount(amount, decimals)} ${tokenName}</span></div><div class="info-row"><span class="label">质押时间</span><span class="value">${formatTimestamp(startTime)}</span></div><div class="info-row"><span class="label">到期时间</span><span class="value">${formatTimestamp(endTime)}</span></div><div class="info-row"><span class="label">剩余时间</span><span class="value countdown" data-end-time="${endTime}">${formatRemainingTime(endTime)}</span></div><div class="info-row"><span class="label">周期</span><span class="value">${periodInfo.name}${cachedDaySeconds !== 86400 ? ' (测试版)' : ''}</span></div><div class="info-row"><span class="label">日利率</span><span class="value rate">${getDailyRate(Number(period))}</span></div><div class="stake-interest"><div class="info-row"><span class="label">已领取利息</span><span class="value">${formatTokenAmount(accumulatedClaimed)} BCBS</span></div><div class="info-row"><span class="label">待领取利息</span><span class="value pending-interest">${pendingDisplay}</span></div></div><div class="stake-actions"><button class="btn btn-primary" data-id="${stakeId}" data-action="claim" ${redeemed || pendingValue <= 0 ? 'disabled' : ''}>💰 领取利息</button>${status.text.includes('可赎回') ? `<button class="btn btn-success" data-id="${stakeId}" data-action="redeem">🔓 赎回本金</button>` : `<button class="btn btn-danger" data-id="${stakeId}" data-action="early" ${redeemed ? 'disabled' : ''}>⚠️ 提前赎回</button>`}</div></div>`;
        }

        function renderGlobalErrorCard(error) { return `<div class="stake-card"><div class="stake-header"><span class="stake-id">⚠️ 系统错误</span></div><div class="info-row"><span class="label">错误</span><span class="value" style="color:#ff6b6b;">${(error.message||'未知').substring(0,150)}</span></div><div class="stake-actions"><button class="btn btn-retry" onclick="loadOrders()">🔄 重新加载</button></div></div>`; }
        function renderErrorCard(id, error) { return `<div class="stake-card"><div class="stake-header"><span class="stake-id"># ${id}</span><span class="stake-status status-error">加载失败</span></div><div class="info-row"><span class="label">错误</span><span class="value" style="color:#ff6b6b;">${(error.message||'未知').substring(0,100)}</span></div></div>`; }
        function renderEmptyCard() { return `<div class="stake-card"><div class="stake-header"><span class="stake-id">📭 暂无质押</span></div><div style="text-align:center;padding:20px 0;color:#6a8aae;"><div style="font-size:32px;margin-bottom:8px;">🔓</div><div>还没有质押订单</div></div></div>`; }
        function renderSkeleton() { return `<div class="stake-card"><div class="stake-header"><div class="skeleton" style="width:40px;height:17px;"></div><div class="skeleton" style="width:70px;height:24px;border-radius:20px;"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:120px;"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:50px;"></div></div><div class="skeleton-interest"><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:80px;"></div></div></div><div class="stake-actions"><div class="skeleton skeleton-btn"></div><div class="skeleton skeleton-btn"></div></div></div>`; }

        function startCountdown() { if (countdownTimer) clearInterval(countdownTimer); countdownTimer = setInterval(() => { document.querySelectorAll('.countdown').forEach(el => { const t = parseInt(el.dataset.endTime); if (t) el.textContent = formatRemainingTime(t); }); }, 10000); }

        function bindOrderActions() {
            document.querySelectorAll('.stake-actions .btn:not(:disabled)').forEach(btn => {
                const newBtn = btn.cloneNode(true); btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', async function() {
                    const id = this.dataset.id, action = this.dataset.action;
                    this.disabled = true; const origText = this.textContent; this.textContent = '处理中...';
                    try {
                        if (action === 'claim') { const pending = await stakeContract.getPendingInterest(id); if (!pending || pending.eq(0)) { alert('没有可领取的利息'); return; } let fee; try { fee = await stakeContract.getBnbRequiredForClaim(pending); } catch (e) { fee = ethers.utils.parseEther('0.01'); } const tx = await stakeContract.claimInterest(id, { value: fee, gasLimit: 500000 }); await tx.wait(); alert('✅ 利息领取成功！'); }
                        else if (action === 'redeem') { if (!confirm('确认赎回本金？')) return; const tx = await stakeContract.redeemPrincipal(id, { gasLimit: 500000 }); await tx.wait(); alert('✅ 本金已赎回！'); }
                        else if (action === 'early') { if (!confirm('⚠️ 提前赎回将扣除30%本金，确定继续？')) return; const tx = await stakeContract.redeemPrincipalEarly(id, { gasLimit: 500000 }); await tx.wait(); alert('⚠️ 提前赎回完成'); }
                        await loadOrders(); await updateAllBalances();
                    } catch (e) { alert('操作失败: ' + (e.reason || e.message)); } finally { this.disabled = false; this.textContent = origText; }
                });
            });
        }

        document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', function() { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentCoin = this.dataset.coin; document.getElementById('coinLabel').textContent = currentCoin; document.getElementById('currencyDisplay').textContent = currentCoin; document.getElementById('stakeAmount').value = '0'; updateBalance(); updateRewardPreview(); }); });
        document.querySelectorAll('.period-btn').forEach(btn => { btn.addEventListener('click', function() { document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentPeriod = parseInt(this.dataset.period); updateRewardPreview(); }); });
        document.getElementById('maxBtn').addEventListener('click', () => { document.getElementById('stakeAmount').value = document.getElementById('availableBalance').textContent; updateRewardPreview(); });
        document.getElementById('stakeAmount').addEventListener('input', updateRewardPreview);

        stakeBtn.addEventListener('click', async () => {
            if (!currentAccount) { alert('请先连接钱包'); return; }
            const amount = document.getElementById('stakeAmount').value;
            if (!amount || parseFloat(amount) <= 0) { alert('请输入有效的质押数量'); return; }
            const tokenContract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
            const decimals = await getDecimals(tokenContract);
            let amountWei; try { amountWei = ethers.utils.parseUnits(amount, decimals); } catch (e) { alert('数量格式错误'); return; }
            stakeBtn.disabled = true; stakeBtn.textContent = '检查余额...';
            try {
                const balance = await tokenContract.balanceOf(currentAccount);
                if (balance.lt(amountWei)) { alert(`${currentCoin} 余额不足`); return; }
                stakeBtn.textContent = '检查授权...';
                const allowance = await tokenContract.allowance(currentAccount, BCBS_ADDRESS);
                if (allowance.lt(amountWei)) { stakeBtn.textContent = '请确认授权...'; try { const tx = await tokenContract.approve(BCBS_ADDRESS, ethers.constants.MaxUint256, { gasLimit: 100000 }); await tx.wait(); alert('✅ 授权成功！请稍候，正在质押...'); } catch (e) { alert('授权失败: ' + (e.reason || e.message)); return; } }
                stakeBtn.textContent = '正在质押...';
                const stakeFunc = currentCoin === 'AIGC' ? stakeContract.stakeAIGC : stakeContract.stakeUSDT;
                const tx = await stakeFunc(amountWei, currentPeriod, { gasLimit: 500000 }); await tx.wait();
                alert('✅ 质押成功！'); document.getElementById('stakeAmount').value = '0'; updateRewardPreview(); await refreshAll();
            } catch (e) { alert('质押失败: ' + (e.reason || e.message)); }
            finally { stakeBtn.disabled = false; stakeBtn.textContent = '立即质押'; }
        });

        function updateUIForConnected(acc) { connectBtn.textContent = `${acc.substring(0,6)}...${acc.substring(acc.length-4)}`; connectBtn.classList.add('connected'); }
        function setDisconnectedUI() { connectBtn.textContent = 'Connect wallet'; connectBtn.classList.remove('connected'); document.getElementById('availableBalance').textContent = '0.00000'; document.getElementById('aigcBalance').textContent = '--'; document.getElementById('usdtBalance').textContent = '--'; document.getElementById('orderListContainer').innerHTML = renderSkeleton(); }
        async function connectWallet() { if (!window.ethereum) { alert('请安装MetaMask钱包'); return; } try { showLoading(); const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' }); currentAccount = accounts[0]; provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner(); initContracts(); await fetchChainParams(); updateUIForConnected(currentAccount); await refreshAll(); } catch (e) { alert('连接失败: ' + e.message); } finally { hideLoading(); } }
        function disconnectWallet() { currentAccount = null; signer = null; provider = null; setDisconnectedUI(); if (countdownTimer) clearInterval(countdownTimer); }
        connectBtn.addEventListener('click', () => { if (currentAccount) disconnectWallet(); else connectWallet(); });

        async function autoConnect() {
            if (!window.ethereum) { connectBtn.textContent = 'No Wallet'; connectBtn.disabled = true; return; }
            try { const accounts = await window.ethereum.request({ method: 'eth_accounts' }); if (accounts.length > 0) { currentAccount = accounts[0]; provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner(); initContracts(); await fetchChainParams(); updateUIForConnected(currentAccount); await refreshAll(); } } catch (e) {}
            window.ethereum.on('accountsChanged', (accounts) => { if (accounts.length === 0) disconnectWallet(); else { currentAccount = accounts[0]; provider = new ethers.providers.Web3Provider(window.ethereum); signer = provider.getSigner(); initContracts(); updateUIForConnected(currentAccount); refreshAll(); } });
            window.ethereum.on('chainChanged', () => window.location.reload());
        }

        window.loadOrders = loadOrders;
        window.retryLoadOrder = retryLoadOrder;
        window.addEventListener('load', autoConnect);
        window.addEventListener('beforeunload', () => { if (countdownTimer) clearInterval(countdownTimer); });
    </script>
</body>
</html>
