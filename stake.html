<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>质押 - BCBS</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js">
    </script>
    <style>
        /* ========== 原样式保持不变 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            color: #ffffff;
        }
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(to right, #aaa, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-area span {
            margin-left: 5px;
        }
        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid #333;
            color: #aaa;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .connect-btn {
            background: transparent;
            border: 1px solid #f90;
            color: #f90;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.1);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .connect-btn.connected {
            background: rgba(255, 153, 0, 0.2);
            border-color: #ffaa00;
            color: #ffd700;
        }
        .connect-btn:disabled,
        .stake-btn:disabled,
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .panel {
            background: rgba(20, 20, 30, 0.6);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255, 170, 0, 0.02);
        }
        .panel::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 12px;
            padding: 1px;
            background: linear-gradient(135deg, #f90, transparent, #f90);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .page-title {
            font-size: 24px;
            color: #f90;
            text-align: center;
            margin: 10px 0 20px;
        }
        .faucet-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .faucet-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .faucet-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .faucet-btn {
            background: linear-gradient(90deg, #ffaa00, #ffdd00);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 700;
            color: #222;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid #444;
            border-radius: 8px;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.2), rgba(255, 170, 0, 0.05));
            border-color: #f90;
            color: #f90;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.2);
        }
        .amount-input-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .amount-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            outline: none;
        }
        .balance-info {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .balance-info .max-btn {
            color: #f90;
            cursor: pointer;
        }
        .period-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .period-btn {
            padding: 10px 5px;
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid #444;
            border-radius: 8px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .period-btn.active {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.3), rgba(255, 170, 0, 0.1));
            border-color: #f90;
            color: #f90;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.2);
        }
        .period-btn .rate-label {
            display: block;
            font-size: 10px;
            color: #f90;
            margin-top: 3px;
        }
        .reward-preview {
            background: rgba(255, 170, 0, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reward-preview span {
            color: #ccc;
            font-size: 13px;
        }
        .reward-preview strong {
            color: #f90;
            font-size: 16px;
        }
        .stake-btn {
            width: 100%;
            background: linear-gradient(90deg, #f4a200, #ffd700);
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-weight: bold;
            color: #111;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
            font-size: 16px;
        }
        .order-list-title {
            font-size: 16px;
            color: #f90;
            margin-bottom: 12px;
        }

        /* ========== 订单卡片 ========== */
        .stake-card {
            background: rgba(16, 26, 46, 0.7);
            border: 1px solid rgba(0, 180, 255, 0.12);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            backdrop-filter: blur(8px);
        }
        .stake-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stake-id {
            font-weight: 600;
            color: #c8d6e5;
            font-size: 17px;
        }
        .stake-status {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd93d;
        }
        .status-ready {
            background: rgba(0, 230, 118, 0.15);
            color: #7bed9f;
        }
        .status-redeemed {
            background: rgba(100, 100, 100, 0.2);
            color: #8a8a8a;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .info-row .label {
            color: #6a8aae;
            font-size: 13px;
        }
        .info-row .value {
            color: #c8d6e5;
            font-size: 13px;
            font-weight: 500;
        }
        .info-row .rate {
            color: #00d4ff;
        }
        .stake-interest {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            margin: 10px 0;
        }
        .stake-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .stake-actions .btn {
            flex: 1;
            padding: 9px 10px;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            min-width: 90px;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: rgba(0, 180, 255, 0.15);
            color: #00d4ff;
        }
        .btn-primary:hover:not(:disabled) {
            background: rgba(0, 180, 255, 0.25);
        }
        .btn-success {
            background: rgba(0, 230, 118, 0.12);
            color: #7bed9f;
        }
        .btn-success:hover:not(:disabled) {
            background: rgba(0, 230, 118, 0.2);
        }
        .btn-danger {
            background: rgba(255, 71, 87, 0.12);
            color: #ff6b6b;
        }
        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 71, 87, 0.2);
        }
        .countdown {
            color: #ffd93d;
            font-weight: 600;
        }
        .pending-interest {
            color: #ffd93d;
            font-weight: 600;
        }

        /* ========== 骨架屏 ========== */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        .skeleton-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            align-items: center;
        }
        .skeleton-label {
            width: 55px;
            height: 14px;
        }
        .skeleton-value {
            width: 90px;
            height: 14px;
        }
        .skeleton-interest {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            margin: 10px 0;
        }
        .skeleton-btn {
            width: 100%;
            height: 36px;
            border-radius: 10px;
        }

        .bottom-nav {
            flex-shrink: 0;
            background: rgba(15, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 153, 0, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            margin: 0 15px 15px 15px;
            position: relative;
        }
        .bottom-nav::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, #f90, transparent, #f90);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 11px;
            gap: 4px;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .nav-item .icon {
            font-size: 20px;
        }
        .nav-item.active {
            color: #f90;
            position: relative;
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #f90;
            border-radius: 5px;
            box-shadow: 0 0 10px #f90;
        }
        .empty-state {
            text-align: center;
            padding: 30px 0;
            color: #6a8aae;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state .title {
            font-size: 16px;
            color: #c8d6e5;
            margin-bottom: 4px;
        }
        .empty-state .sub {
            font-size: 13px;
            color: #6a8aae;
        }
        .error-state {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
        }
        .error-state .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area">🚀 <span>BCBS</span></div>
                <div class="header-controls">
                    <button class="lang-btn">🇺🇸 EN ⌄</button>
                    <button id="connectWalletBtn" class="connect-btn">Connect wallet</button>
                </div>
            </div>
            <div class="page-title">🔒 质押挖矿</div>

            <!-- 水龙头 -->
            <div class="panel faucet-panel">
                <div class="faucet-info">
                    <div class="faucet-item">🪙 AIGC <span style="color:#f90;">100</span></div>
                    <div class="faucet-item">💵 USDT <span style="color:#f90;">100</span></div>
                </div>
                <button class="faucet-btn" id="claimFaucetBtn">领取测试币</button>
            </div>

            <!-- 质押表单 -->
            <div class="panel">
                <div class="tab-container">
                    <div class="tab-btn active" data-coin="AIGC">AIGC</div>
                    <div class="tab-btn" data-coin="USDT">USDT</div>
                </div>
                <div class="balance-info">
                    <span>可质押余额: <span id="availableBalance">0.00</span> <span id="coinLabel">AIGC</span></span>
                    <span class="max-btn" id="maxBtn">MAX</span>
                </div>
                <div class="amount-input-wrapper">
                    <input type="number" id="stakeAmount" placeholder="0.00" value="0" />
                    <span id="currencyDisplay" style="color:#f90;font-size:14px;font-weight:600;">AIGC</span>
                </div>
                <div style="color:#ccc;font-size:13px;margin-bottom:8px;">选择质押周期</div>
                <div class="period-grid">
                    <div class="period-btn active" data-period="0">7天<span class="rate-label">日利率0.8%</span></div>
                    <div class="period-btn" data-period="1">35天<span class="rate-label">日利率1.3%</span></div>
                    <div class="period-btn" data-period="2">180天<span class="rate-label">日利率1.8%</span></div>
                    <div class="period-btn" data-period="3">360天<span class="rate-label">日利率2.1%</span></div>
                    <div class="period-btn" data-period="4">540天<span class="rate-label">日利率2.3%</span></div>
                    <div class="period-btn" data-period="5">720天<span class="rate-label">日利率2.6%</span></div>
                </div>
                <div class="reward-preview">
                    <span>预计可获得利息</span>
                    <strong id="estimatedReward">0.00 BCBS</strong>
                </div>
                <button class="stake-btn" id="stakeSubmitBtn">立即质押</button>
            </div>

            <!-- 质押订单列表 -->
            <div class="panel">
                <div class="order-list-title">📋 我的质押订单</div>
                <div id="orderListContainer">
                    <!-- 骨架屏由 JS 动态渲染 -->
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="icon">💼</span><span>资产</span></a>
            <a href="stake.html" class="nav-item active"><span class="icon">🔒</span><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><span class="icon">💧</span><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><span class="icon">📨</span><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><span class="icon">🌐</span><span>生态</span></a>
        </div>
    </div>

    <script>
        // ======================== 合约地址 ========================
        const AIGC_ADDRESS = '0x49CaB5FCE501e3209d1933a745413D061879AA7a';
        const BCBS_ADDRESS = '0xC2ED87266c9F35eeb6715624264A8163A361FCd7';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';

        // ======================== ABI ========================
        const ERC20_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function decimals() view returns (uint8)",
            "function approve(address,uint256) returns (bool)",
            "function allowance(address,address) view returns (uint256)"
        ];

        // 修复：完整 ABI，使用 tuple 结构体解析
        const STAKE_ABI = [
            "function stakeAIGC(uint256,uint8) returns (bool)",
            "function stakeUSDT(uint256,uint8) returns (bool)",
            "function getUserStakeIds(address) view returns (uint256[])",
            "function getStakeInfo(uint256) view returns (tuple(uint256 id, address user, uint8 tokenType, uint256 amount, uint256 startTime, uint8 period, bool redeemed, uint256 lastClaimTime, uint256 accumulatedClaimed))",
            "function getPendingInterest(uint256) view returns (uint256)",
            "function getBnbRequiredForClaim(uint256) view returns (uint256)",
            "function claimInterest(uint256) payable",
            "function redeemPrincipal(uint256) returns (bool)",
            "function redeemPrincipalEarly(uint256) returns (bool)"
        ];

        // ======================== 全局变量 ========================
        let provider, signer, currentAccount;
        let stakeContract, aigcContract, usdtContract;
        let currentCoin = 'AIGC';
        let currentPeriod = 0;
        let countdownTimer = null;

        const periodDays = [7, 35, 180, 360, 540, 720];
        const dailyRates = [0.008, 0.013, 0.018, 0.021, 0.023, 0.026];

        // ======================== DOM 引用 ========================
        const connectBtn = document.getElementById('connectWalletBtn');
        const stakeBtn = document.getElementById('stakeSubmitBtn');

        // ======================== 工具函数 ========================
        function formatTokenAmount(amount, decimals = 18) {
            if (!amount || amount === '0') return '0.0000';
            return parseFloat(ethers.utils.formatUnits(amount, decimals)).toFixed(4);
        }

        function formatTimestamp(timestamp) {
            if (!timestamp || timestamp === '0') return '--';
            return new Date(timestamp * 1000).toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        function formatRemainingTime(endTime) {
            const now = Math.floor(Date.now() / 1000);
            const remaining = endTime - now;
            if (remaining <= 0) return '已到期 ✅';
            const days = Math.floor(remaining / 86400);
            const hours = Math.floor((remaining % 86400) / 3600);
            const minutes = Math.floor((remaining % 3600) / 60);
            if (days > 0) return `${days}天${hours}小时${minutes}分钟`;
            if (hours > 0) return `${hours}小时${minutes}分钟`;
            return `${minutes}分钟`;
        }

        function getPeriodName(period) {
            const map = {
                0: { name: '7 天', test: '35 分钟' },
                1: { name: '35 天', test: '175 分钟' },
                2: { name: '180 天', test: '15 小时' },
                3: { name: '360 天', test: '30 小时' },
                4: { name: '540 天', test: '45 小时' },
                5: { name: '720 天', test: '60 小时' }
            };
            return map[period] || { name: '未知', test: '--' };
        }

        function getDailyRate(period) {
            const map = { 0: '0.8%', 1: '1.3%', 2: '1.8%', 3: '2.1%', 4: '2.3%', 5: '2.6%' };
            return map[period] || '--';
        }

        function getStatusLabel(redeemed, endTime) {
            if (redeemed) return { text: '已赎回 ✅', cls: 'status-redeemed' };
            if (Math.floor(Date.now() / 1000) >= endTime) return { text: '可赎回 🟢', cls: 'status-ready' };
            return { text: '⏳ 质押中', cls: 'status-active' };
        }

        function getPeriodSeconds(periodIndex) {
            return periodDays[periodIndex] * 86400;
        }

        // ======================== 初始化合约 ========================
        function initContracts() {
            if (provider && signer) {
                aigcContract = new ethers.Contract(AIGC_ADDRESS, ERC20_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, ERC20_ABI, signer);
                stakeContract = new ethers.Contract(BCBS_ADDRESS, STAKE_ABI, signer);
            }
        }

        async function getTokenDecimals() {
            const contract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
            if (!contract) return 18;
            try { return await contract.decimals(); } catch (e) { return 18; }
        }

        // ======================== 余额 & 预览 ========================
        async function updateBalance() {
            const contract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
            if (!contract || !currentAccount) {
                document.getElementById('availableBalance').textContent = '0.00';
                return;
            }
            try {
                const decimals = await getTokenDecimals();
                const balance = await contract.balanceOf(currentAccount);
                document.getElementById('availableBalance').textContent = ethers.utils.formatUnits(balance, decimals);
            } catch (e) {
                document.getElementById('availableBalance').textContent = '0.00';
            }
        }

        function updateRewardPreview() {
            const amount = parseFloat(document.getElementById('stakeAmount').value) || 0;
            const reward = amount * dailyRates[currentPeriod] * periodDays[currentPeriod];
            document.getElementById('estimatedReward').textContent = `${reward.toFixed(4)} BCBS`;
        }

        // ======================== 🟢 核心：加载质押订单（100% 修复） ========================
        async function loadOrders() {
            const container = document.getElementById('orderListContainer');

            if (!currentAccount) {
                container.innerHTML = renderSkeleton();
                return;
            }

            container.innerHTML = renderSkeleton();

            try {
                // 1. 获取质押 ID 列表
                const ids = await stakeContract.getUserStakeIds(currentAccount);
                console.log('✅ getUserStakeIds 返回:', ids);

                // 2. 空状态
                if (!ids || ids.length === 0) {
                    container.innerHTML = renderEmptyState();
                    return;
                }

                let html = '';

                // 3. 遍历每个 ID
                for (let i = 0; i < ids.length; i++) {
                    const id = ids[i];

                    // 获取质押详情（结构体直接解析）
                    const stake = await stakeContract.getStakeInfo(id);
                    console.log(`✅ getStakeInfo(${id}) 返回:`, stake);

                    // 获取待领取利息
                    const pending = await stakeContract.getPendingInterest(id);
                    console.log(`✅ getPendingInterest(${id}) 返回:`, pending);

                    // ---------- 解析数据 ----------
                    const tokenName = stake.tokenType === 0 ? 'AIGC' : 'USDT';
                    const decimals = stake.tokenType === 0 ? await getTokenDecimals() : 18;
                    const amountStr = formatTokenAmount(stake.amount, decimals);
                    const pendingStr = formatTokenAmount(pending, 18);
                    const accumulatedStr = formatTokenAmount(stake.accumulatedClaimed, 18);

                    const startTime = parseInt(stake.startTime);
                    const periodSeconds = getPeriodSeconds(parseInt(stake.period));
                    const endTime = startTime + periodSeconds;

                    const status = getStatusLabel(stake.redeemed, endTime);
                    const isRedeemed = stake.redeemed;
                    const isReady = status.text === '可赎回 🟢';
                    const hasPending = parseFloat(pendingStr) > 0;

                    // ---------- 渲染卡片 ----------
                    html += `
                        <div class="stake-card" data-id="${id}">
                            <div class="stake-header">
                                <span class="stake-id"># ${stake.id}</span>
                                <span class="stake-status ${status.cls}">${status.text}</span>
                            </div>
                            <div class="info-row"><span class="label">质押资产</span><span class="value">${tokenName}</span></div>
                            <div class="info-row"><span class="label">质押数量</span><span class="value">${amountStr} ${tokenName}</span></div>
                            <div class="info-row"><span class="label">质押时间</span><span class="value">${formatTimestamp(startTime)}</span></div>
                            <div class="info-row"><span class="label">到期时间</span><span class="value">${formatTimestamp(endTime)}</span></div>
                            <div class="info-row"><span class="label">剩余时间</span><span class="value countdown" data-end-time="${endTime}">${formatRemainingTime(endTime)}</span></div>
                            <div class="info-row"><span class="label">周期</span><span class="value">${getPeriodName(stake.period).name}</span></div>
                            <div class="info-row"><span class="label">日利率</span><span class="value rate">${getDailyRate(stake.period)}</span></div>
                            <div class="stake-interest">
                                <div class="info-row"><span class="label">已领取利息</span><span class="value">${accumulatedStr} BCBS</span></div>
                                <div class="info-row"><span class="label">待领取利息</span><span class="value pending-interest">${pendingStr} BCBS</span></div>
                            </div>
                            <div class="stake-actions">
                                <button class="btn btn-primary" data-action="claim" data-id="${id}" ${isRedeemed || !hasPending ? 'disabled' : ''}>💰 领取利息</button>
                                <button class="btn btn-success" data-action="redeem" data-id="${id}" ${isRedeemed || !isReady ? 'disabled' : ''}>🔓 赎回本金</button>
                                <button class="btn btn-danger" data-action="early" data-id="${id}" ${isRedeemed ? 'disabled' : ''}>⚠️ 提前赎回</button>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = html;
                bindOrderActions();

                // 启动倒计时
                if (countdownTimer) clearInterval(countdownTimer);
                countdownTimer = setInterval(() => {
                    document.querySelectorAll('.countdown[data-end-time]').forEach(el => {
                        const t = parseInt(el.dataset.endTime);
                        if (t) el.textContent = formatRemainingTime(t);
                    });
                }, 10000);

            } catch (error) {
                console.error('❌ loadOrders 错误:', error);
                container.innerHTML = renderErrorState(error.message || '加载失败，请刷新重试');
            }
        }

        // ======================== 绑定订单按钮事件 ========================
        function bindOrderActions() {
            document.querySelectorAll('.stake-actions .btn:not([disabled])').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const action = this.dataset.action;
                    const id = this.dataset.id;
                    if (!id) return;

                    this.disabled = true;
                    const origText = this.textContent;
                    this.textContent = '处理中...';

                    try {
                        if (action === 'claim') {
                            const pending = await stakeContract.getPendingInterest(id);
                            if (pending.eq(0)) { alert('暂无待领取利息'); this.disabled = false;
                                this.textContent = origText; return; }
                            const fee = await stakeContract.getBnbRequiredForClaim(pending);
                            const tx = await stakeContract.claimInterest(id, { value: fee, gasLimit: 300000 });
                            await tx.wait();
                            alert('✅ 利息领取成功！');
                        } else if (action === 'redeem') {
                            if (!confirm('确认赎回本金？')) { this.disabled = false;
                                this.textContent = origText; return; }
                            const tx = await stakeContract.redeemPrincipal(id, { gasLimit: 300000 });
                            await tx.wait();
                            alert('✅ 本金已赎回！');
                        } else if (action === 'early') {
                            if (!confirm('⚠️ 提前赎回将扣除30%本金，确定继续？')) { this.disabled = false;
                                this.textContent = origText; return; }
                            const tx = await stakeContract.redeemPrincipalEarly(id, { gasLimit: 300000 });
                            await tx.wait();
                            alert('⚠️ 提前赎回完成');
                        }
                        await loadOrders();
                    } catch (e) {
                        alert('操作失败: ' + (e.reason || e.message || '未知错误'));
                        this.disabled = false;
                        this.textContent = origText;
                    }
                });
            });
        }

        // ======================== 渲染函数 ========================
        function renderSkeleton() {
            return `
                <div class="stake-card">
                    <div class="stake-header"><div class="skeleton" style="width:40px;height:17px;"></div><div class="skeleton" style="width:70px;height:24px;border-radius:20px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:120px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:50px;"></div></div>
                    <div class="skeleton-interest"><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div><div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:80px;"></div></div></div>
                    <div class="stake-actions"><div class="skeleton skeleton-btn"></div><div class="skeleton skeleton-btn"></div><div class="skeleton skeleton-btn"></div></div>
                </div>
            `;
        }

        function renderEmptyState() {
            return `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <div class="title">暂无质押记录</div>
                    <div class="sub">质押 AIGC 或 USDT 开始赚取利息</div>
                </div>
            `;
        }

        function renderErrorState(msg) {
            return `
                <div class="error-state">
                    <div class="icon">⚠️</div>
                    <div>${msg}</div>
                </div>
            `;
        }

        // ======================== 刷新全部 ========================
        async function refreshAll() {
            if (!currentAccount) return;
            await updateBalance();
            updateRewardPreview();
            await loadOrders();
        }

        // ======================== 钱包连接 ========================
        function updateUIForConnected(acc) {
            connectBtn.textContent = `${acc.substring(0, 6)}...${acc.substring(acc.length - 4)}`;
            connectBtn.classList.add('connected');
            connectBtn.onclick = disconnectWallet;
        }

        function setDisconnectedUI() {
            connectBtn.textContent = 'Connect wallet';
            connectBtn.classList.remove('connected');
            connectBtn.onclick = connectWallet;
            document.getElementById('availableBalance').textContent = '0.00';
            document.getElementById('orderListContainer').innerHTML = renderSkeleton();
        }

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') { alert('请安装 MetaMask'); return; }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                initContracts();
                updateUIForConnected(currentAccount);
                await refreshAll();
            } catch (e) {
                alert('连接失败: ' + e.message);
            }
        }

        function disconnectWallet() {
            currentAccount = null;
            signer = null;
            setDisconnectedUI();
            if (countdownTimer) clearInterval(countdownTimer);
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length === 0) disconnectWallet();
            else {
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                initContracts();
                updateUIForConnected(currentAccount);
                refreshAll();
            }
        }

        async function autoConnect() {
            if (typeof window.ethereum !== 'undefined') {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                try {
                    const accounts = await provider.listAccounts();
                    if (accounts.length > 0) {
                        currentAccount = accounts[0];
                        signer = provider.getSigner();
                        initContracts();
                        updateUIForConnected(currentAccount);
                        await refreshAll();
                    } else setDisconnectedUI();
                } catch (e) { setDisconnectedUI(); }
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                window.ethereum.on('chainChanged', () => window.location.reload());
            } else {
                connectBtn.textContent = 'No Wallet';
                connectBtn.disabled = true;
            }
        }

        // ======================== 事件绑定 ========================
        document.getElementById('claimFaucetBtn').addEventListener('click', () => {
            if (!currentAccount) { alert('请先连接钱包'); return; }
            alert('领取测试币成功（模拟）');
            updateBalance();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCoin = this.dataset.coin;
                document.getElementById('coinLabel').textContent = currentCoin;
                document.getElementById('currencyDisplay').textContent = currentCoin;
                document.getElementById('stakeAmount').value = '0';
                updateBalance();
                updateRewardPreview();
            });
        });

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = parseInt(this.dataset.period);
                updateRewardPreview();
            });
        });

        document.getElementById('maxBtn').addEventListener('click', () => {
            document.getElementById('stakeAmount').value = document.getElementById('availableBalance').textContent;
            updateRewardPreview();
        });

        document.getElementById('stakeAmount').addEventListener('input', updateRewardPreview);

        // ======================== 质押提交 ========================
        stakeBtn.addEventListener('click', async () => {
            if (!currentAccount) { alert('请先连接钱包'); return; }
            const amount = document.getElementById('stakeAmount').value;
            if (!amount || parseFloat(amount) <= 0) { alert('请输入有效的质押数量'); return; }

            const tokenContract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
            const decimals = await getTokenDecimals();
            const amountWei = ethers.utils.parseUnits(amount, decimals);

            stakeBtn.disabled = true;
            stakeBtn.textContent = '检查授权中...';

            try {
                const allowance = await tokenContract.allowance(currentAccount, BCBS_ADDRESS);
                if (allowance.lt(amountWei)) {
                    stakeBtn.textContent = '请确认授权...';
                    const tx = await tokenContract.approve(BCBS_ADDRESS, ethers.constants.MaxUint256);
                    await tx.wait();
                    stakeBtn.textContent = '正在质押...';
                }
                const stakeFunc = currentCoin === 'AIGC' ? stakeContract.stakeAIGC : stakeContract.stakeUSDT;
                const tx = await stakeFunc(amountWei, currentPeriod, { gasLimit: 500000 });
                await tx.wait();
                alert('✅ 质押成功！');
                document.getElementById('stakeAmount').value = '0';
                updateRewardPreview();
                await refreshAll();
            } catch (e) {
                alert('质押失败: ' + (e.reason || e.message || '未知错误'));
            } finally {
                stakeBtn.disabled = false;
                stakeBtn.textContent = '立即质押';
            }
        });

        connectBtn.addEventListener('click', connectWallet);

        // ======================== 启动 ========================
        window.addEventListener('load', autoConnect);
    </script>
</body>
</html>
