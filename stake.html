<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>质押 - BCBS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: #ffffff; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; background: radial-gradient(circle at center, #111 0%, #030303 100%); border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: bold; background: linear-gradient(to right, #aaa, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .connect-btn { background: transparent; border: 1px solid #f90; color: #f90; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 0 10px rgba(255,153,0,0.1); transition: all 0.2s; white-space: nowrap; }
        .connect-btn.connected { background: rgba(255,153,0,0.2); border-color: #ffaa00; color: #ffd700; }
        .connect-btn:disabled, .stake-btn:disabled, .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .panel { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; position: relative; box-shadow: inset 0 0 20px rgba(255,170,0,0.02); }
        .panel::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 12px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .page-title { font-size: 24px; color: #f90; text-align: center; margin: 10px 0 20px; }
        .faucet-panel { display: flex; align-items: center; justify-content: space-between; }
        .faucet-info { display: flex; flex-direction: column; gap: 8px; }
        .faucet-item { display: flex; align-items: center; gap: 8px; }
        .faucet-btn { background: linear-gradient(90deg, #ffaa00, #ffdd00); border: none; padding: 12px 20px; border-radius: 25px; font-weight: 700; color: #222; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(30,30,40,0.8); border: 1px solid #444; border-radius: 8px; color: #aaa; font-size: 14px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,170,0,0.05)); border-color: #f90; color: #f90; box-shadow: 0 0 10px rgba(255,170,0,0.2); }
        .amount-input-wrapper { background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .amount-input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; }
        .balance-info { display: flex; justify-content: space-between; color: #aaa; font-size: 12px; margin-bottom: 5px; }
        .balance-info .max-btn { color: #f90; cursor: pointer; }
        .period-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .period-btn { padding: 10px 5px; background: rgba(30,30,40,0.8); border: 1px solid #444; border-radius: 8px; color: #aaa; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .period-btn.active { background: linear-gradient(135deg, rgba(255,170,0,0.3), rgba(255,170,0,0.1)); border-color: #f90; color: #f90; box-shadow: 0 0 10px rgba(255,170,0,0.2); }
        .period-btn .rate-label { display: block; font-size: 10px; color: #f90; margin-top: 3px; }
        .reward-preview { background: rgba(255,170,0,0.05); border-radius: 8px; padding: 10px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .reward-preview span { color: #ccc; font-size: 13px; }
        .reward-preview strong { color: #f90; font-size: 16px; }
        .stake-btn { width: 100%; background: linear-gradient(90deg, #f4a200, #ffd700); border: none; border-radius: 8px; padding: 14px; font-weight: bold; color: #111; cursor: pointer; box-shadow: 0 4px 15px rgba(255,170,0,0.3); font-size: 16px; }
        .order-list-title { font-size: 16px; color: #f90; margin-bottom: 12px; }

        .stake-card {
            background: rgba(16, 26, 46, 0.7);
            border: 1px solid rgba(0, 180, 255, 0.12);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            backdrop-filter: blur(8px);
        }
        .stake-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stake-id { font-weight: 600; color: #c8d6e5; font-size: 17px; }
        .stake-status { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-active { background: rgba(255, 215, 0, 0.15); color: #ffd93d; }
        .status-ready { background: rgba(0, 230, 118, 0.15); color: #7bed9f; }
        .status-redeemed { background: rgba(100, 100, 100, 0.2); color: #8a8a8a; }
        .status-error { background: rgba(255, 71, 87, 0.12); color: #ff6b6b; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .info-row .label { color: #6a8aae; font-size: 13px; }
        .info-row .value { color: #c8d6e5; font-size: 13px; font-weight: 500; }
        .info-row .rate { color: #00d4ff; }
        .stake-interest { background: rgba(0, 0, 0, 0.2); border-radius: 10px; padding: 10px 14px; margin: 10px 0; }
        .stake-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .stake-actions .btn { flex: 1; padding: 9px 10px; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; min-width: 90px; font-size: 12px; transition: all 0.2s; }
        .btn-primary { background: rgba(0, 180, 255, 0.15); color: #00d4ff; }
        .btn-primary:hover:not(:disabled) { background: rgba(0, 180, 255, 0.25); }
        .btn-success { background: rgba(0, 230, 118, 0.12); color: #7bed9f; }
        .btn-success:hover:not(:disabled) { background: rgba(0, 230, 118, 0.2); }
        .btn-danger { background: rgba(255, 71, 87, 0.12); color: #ff6b6b; }
        .btn-danger:hover:not(:disabled) { background: rgba(255, 71, 87, 0.2); }
        .btn-retry { background: rgba(255, 170, 0, 0.12); color: #f90; }
        .btn-retry:hover { background: rgba(255, 170, 0, 0.25); }
        .countdown { color: #ffd93d; font-weight: 600; }
        .pending-interest { color: #ffd93d; font-weight: 600; }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-row { display: flex; justify-content: space-between; padding: 8px 0; align-items: center; }
        .skeleton-label { width: 55px; height: 14px; }
        .skeleton-value { width: 90px; height: 14px; }
        .skeleton-interest { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px 14px; margin: 10px 0; }
        .skeleton-btn { width: 100%; height: 36px; border-radius: 10px; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,170,0,0.2);
            border-top: 3px solid #f90;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav { flex-shrink: 0; background: rgba(15,15,30,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,153,0,0.15); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 12px 0; margin: 0 15px 15px 15px; position: relative; }
        .bottom-nav::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(135deg, #f90, transparent, #f90); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; transition: all 0.2s ease; text-decoration: none; }
        .nav-item .icon { font-size: 20px; }
        .nav-item.active { color: #f90; position: relative; }
        .nav-item.active::after { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: #f90; border-radius: 5px; box-shadow: 0 0 10px #f90; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area">🚀 <span>BCBS</span></div>
                <div class="header-controls">
                    <button class="lang-btn">🇺🇸 EN ⌄</button>
                    <button id="connectWalletBtn" class="connect-btn">Connect wallet</button>
                </div>
            </div>
            <div class="page-title">🔒 质押挖矿</div>

            <div class="panel faucet-panel">
                <div class="faucet-info">
                    <div class="faucet-item">🪙 AIGC <span style="color:#f90;" id="aigcBalance">--</span></div>
                    <div class="faucet-item">💵 USDT <span style="color:#f90;" id="usdtBalance">--</span></div>
                </div>
                <button class="faucet-btn" id="claimFaucetBtn">领取测试币</button>
            </div>

            <div class="panel">
                <div class="tab-container">
                    <div class="tab-btn active" data-coin="AIGC">AIGC</div>
                    <div class="tab-btn" data-coin="USDT">USDT</div>
                </div>
                <div class="balance-info">
                    <span>可质押余额: <span id="availableBalance">0.00</span> <span id="coinLabel">AIGC</span></span>
                    <span class="max-btn" id="maxBtn">MAX</span>
                </div>
                <div class="amount-input-wrapper">
                    <input type="number" id="stakeAmount" placeholder="0.00" value="0">
                    <span id="currencyDisplay" style="color:#f90;font-size:14px;font-weight:600;">AIGC</span>
                </div>
                <div style="color:#ccc;font-size:13px;margin-bottom:8px;">选择质押周期</div>
                <div class="period-grid">
                    <div class="period-btn active" data-period="0">7天<span class="rate-label">日利率0.8%</span></div>
                    <div class="period-btn" data-period="1">35天<span class="rate-label">日利率1.3%</span></div>
                    <div class="period-btn" data-period="2">180天<span class="rate-label">日利率1.8%</span></div>
                    <div class="period-btn" data-period="3">360天<span class="rate-label">日利率2.1%</span></div>
                    <div class="period-btn" data-period="4">540天<span class="rate-label">日利率2.3%</span></div>
                    <div class="period-btn" data-period="5">720天<span class="rate-label">日利率2.6%</span></div>
                </div>
                <div class="reward-preview">
                    <span>预计可获得利息</span>
                    <strong id="estimatedReward">0.00 BCBS</strong>
                </div>
                <button class="stake-btn" id="stakeSubmitBtn">立即质押</button>
            </div>

            <div class="panel">
                <div class="order-list-title">📋 我的质押订单</div>
                <div id="orderListContainer">
                    <div class="stake-card">
                        <div class="stake-header">
                            <div class="skeleton" style="width:40px;height:17px;"></div>
                            <div class="skeleton" style="width:70px;height:24px;border-radius:20px;"></div>
                        </div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:120px;"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:50px;"></div></div>
                        <div class="skeleton-interest">
                            <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                            <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:80px;"></div></div>
                        </div>
                        <div class="stake-actions">
                            <div class="skeleton skeleton-btn"></div>
                            <div class="skeleton skeleton-btn"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><span class="icon">💼</span><span>资产</span></a>
            <a href="stake.html" class="nav-item active"><span class="icon">🔒</span><span>质押</span></a>
            <a href="liquidity.html" class="nav-item"><span class="icon">💧</span><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><span class="icon">📨</span><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><span class="icon">🌐</span><span>生态</span></a>
        </div>
    </div>

    <!-- 加载指示器 -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // ======================== 配置 ========================
        const AIGC_ADDRESS = '0x49CaB5FCE501e3209d1933a745413D061879AA7a';
        const BCBS_ADDRESS = '0xC2ED87266c9F35eeb6715624264A8163A361FCd7';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';

        const ERC20_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function decimals() view returns (uint8)",
            "function approve(address,uint256) returns (bool)",
            "function allowance(address,address) view returns (uint256)"
        ];

        const STAKE_ABI = [
            "function stakeAIGC(uint256,uint8) returns (bool)",
            "function stakeUSDT(uint256,uint8) returns (bool)",
            "function getUserStakeIds(address) view returns (uint256[])",
            "function getStakeInfo(uint256) view returns (tuple(uint256 id, address user, uint8 tokenType, uint256 amount, uint256 startTime, uint8 period, bool redeemed, uint256 lastClaimTime, uint256 accumulatedClaimed))",
            "function getPendingInterest(uint256) view returns (uint256)",
            "function getBnbRequiredForClaim(uint256) view returns (uint256)",
            "function claimInterest(uint256) payable",
            "function redeemPrincipal(uint256) returns (bool)",
            "function redeemPrincipalEarly(uint256) returns (bool)",
            "function daySeconds() view returns (uint256)",
            "function getBCBSEPrice() view returns (uint256)"
        ];

        // ======================== 状态 ========================
        let provider, signer, currentAccount;
        let stakeContract, aigcContract, usdtContract;
        const connectBtn = document.getElementById('connectWalletBtn');
        const stakeBtn = document.getElementById('stakeSubmitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const periodDays = [7, 35, 180, 360, 540, 720];
        const dailyRates = [0.008, 0.013, 0.018, 0.021, 0.023, 0.026];
        let currentCoin = 'AIGC', currentPeriod = 0, countdownTimer = null;
        let cachedDaySeconds = 86400; // 默认1天，会从合约动态读取

        // ======================== 工具函数 ========================
        function showLoading() { loadingOverlay.style.display = 'flex'; }
        function hideLoading() { loadingOverlay.style.display = 'none'; }

        function formatTokenAmount(amount, decimals = 18) {
            if (!amount || amount === '0' || amount === 0) return '0.0000';
            try {
                if (typeof amount === 'object' && amount._isBigNumber) {
                    return parseFloat(ethers.utils.formatUnits(amount, decimals)).toFixed(4);
                }
                return parseFloat(amount).toFixed(4);
            } catch(e) {
                console.warn('formatTokenAmount error:', e, amount);
                return '0.0000';
            }
        }

        function formatTimestamp(timestamp) {
            if (!timestamp || timestamp === '0' || timestamp === 0) return '--';
            try {
                const ts = typeof timestamp === 'object' ? timestamp.toNumber() : parseInt(timestamp);
                return new Date(ts * 1000).toLocaleString('zh-CN', {
                    year:'numeric', month:'2-digit', day:'2-digit',
                    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
                });
            } catch(e) { return '--'; }
        }

        function formatRemainingTime(endTime) {
            const now = Math.floor(Date.now()/1000);
            const remaining = endTime - now;
            if (remaining <= 0) return '已到期 ✅';
            const days = Math.floor(remaining/86400);
            const hours = Math.floor((remaining%86400)/3600);
            const minutes = Math.floor((remaining%3600)/60);
            if (days > 0) return `${days}天${hours}小时${minutes}分钟`;
            if (hours > 0) return `${hours}小时${minutes}分钟`;
            return `${minutes}分钟`;
        }

        function getPeriodName(period) {
            const map = {
                0: {name:'7 天', test:'35 分钟'},
                1: {name:'35 天', test:'175 分钟'},
                2: {name:'180 天', test:'15 小时'},
                3: {name:'360 天', test:'30 小时'},
                4: {name:'540 天', test:'45 小时'},
                5: {name:'720 天', test:'60 小时'}
            };
            return map[period] || {name:'未知', test:'--'};
        }

        function getDailyRate(period) {
            const map = {0:'0.8%', 1:'1.3%', 2:'1.8%', 3:'2.1%', 4:'2.3%', 5:'2.6%'};
            return map[period] || '--';
        }

        function getStatusLabel(redeemed, endTime) {
            if (redeemed) return { text:'已赎回 ✅', cls:'status-redeemed' };
            const now = Math.floor(Date.now()/1000);
            if (now >= endTime) return { text:'可赎回 🟢', cls:'status-ready' };
            return { text:'⏳ 质押中', cls:'status-active' };
        }

        // ======================== 合约初始化 ========================
        function initContracts() {
            if (provider && signer) {
                aigcContract = new ethers.Contract(AIGC_ADDRESS, ERC20_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, ERC20_ABI, signer);
                stakeContract = new ethers.Contract(BCBS_ADDRESS, STAKE_ABI, signer);
            }
        }

        // ======================== 获取链上参数 ========================
        async function fetchChainParams() {
            if (!stakeContract) return;
            try {
                const ds = await stakeContract.daySeconds();
                if (ds && ds.gt(0)) {
                    cachedDaySeconds = ds.toNumber();
                    console.log('✅ 已获取 daySeconds:', cachedDaySeconds, '秒');
                }
            } catch (e) {
                console.warn('⚠️ 无法获取 daySeconds，使用默认值 86400 秒:', e.message);
                cachedDaySeconds = 86400;
            }
        }

        async function getDecimals(contract) {
            try {
                const d = await contract.decimals();
                return d;
            } catch (e) {
                console.warn('获取精度失败，默认18:', e.message);
                return 18;
            }
        }

        // ======================== 余额更新 ========================
        async function updateBalance() {
            try {
                const contract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
                if (!contract || !currentAccount) {
                    document.getElementById('availableBalance').textContent = '0.00';
                    return;
                }
                const balance = await contract.balanceOf(currentAccount);
                const decimals = await getDecimals(contract);
                document.getElementById('availableBalance').textContent = ethers.utils.formatUnits(balance, decimals);
            } catch (e) {
                console.error('更新余额失败:', e);
                document.getElementById('availableBalance').textContent = '0.00';
            }
        }

        async function updateAllBalances() {
            if (!currentAccount || !aigcContract || !usdtContract) return;
            try {
                const [aigcBal, usdtBal, aigcDec, usdtDec] = await Promise.all([
                    aigcContract.balanceOf(currentAccount),
                    usdtContract.balanceOf(currentAccount),
                    getDecimals(aigcContract),
                    getDecimals(usdtContract)
                ]);
                document.getElementById('aigcBalance').textContent = ethers.utils.formatUnits(aigcBal, aigcDec);
                document.getElementById('usdtBalance').textContent = ethers.utils.formatUnits(usdtBal, usdtDec);
            } catch (e) {
                console.error('更新所有余额失败:', e);
            }
        }

        function updateRewardPreview() {
            const amount = parseFloat(document.getElementById('stakeAmount').value) || 0;
            const reward = amount * dailyRates[currentPeriod] * periodDays[currentPeriod];
            document.getElementById('estimatedReward').textContent = `${reward.toFixed(4)} BCBS`;
        }

        async function refreshAll() {
            if (!currentAccount) return;
            await Promise.all([
                updateBalance(),
                updateAllBalances(),
                loadOrders()
            ]);
            updateRewardPreview();
        }

        // ======================== 加载质押订单（核心修复） ========================
        async function loadOrders() {
            const container = document.getElementById('orderListContainer');
            if (!currentAccount || !stakeContract) {
                container.innerHTML = renderSkeleton();
                return;
            }

            // 显示骨架屏
            container.innerHTML = renderSkeleton();

            try {
                // ✅ 步骤1：获取用户所有质押ID
                const ids = await stakeContract.getUserStakeIds(currentAccount);
                console.log('📋 获取到质押IDs:', ids.map(id => id.toString()));

                if (!ids || ids.length === 0) {
                    container.innerHTML = renderEmptyCard();
                    return;
                }

                let html = '';
                let successCount = 0;
                let failedCount = 0;

                // ✅ 步骤2：逐个加载订单，独立错误处理
                for (const id of ids) {
                    try {
                        const orderHtml = await loadSingleOrder(id);
                        html += orderHtml;
                        successCount++;
                    } catch (orderErr) {
                        console.error(`❌ 订单 #${id} 加载失败:`, orderErr);
                        failedCount++;
                        html += renderErrorCard(id, orderErr);
                    }
                }

                // ✅ 步骤3：显示统计信息
                if (failedCount > 0) {
                    html += `
                        <div style="color:#f90;text-align:center;padding:10px;font-size:12px;background:rgba(255,170,0,0.05);border-radius:8px;margin-top:8px;">
                            ✅ ${successCount} 个订单正常 &nbsp;|&nbsp; ❌ ${failedCount} 个订单加载失败
                        </div>`;
                }

                container.innerHTML = html;
                startCountdown();
                bindOrderActions();
                console.log(`✅ 订单加载完成: 成功${successCount}, 失败${failedCount}`);

            } catch (e) {
                console.error('❌ loadOrders 整体失败:', e);
                container.innerHTML = renderGlobalErrorCard(e);
            }
        }

        // ✅ 新增：加载单个订单
        async function loadSingleOrder(id) {
            try {
                // ✅ 修复1：直接调用 view 函数，不使用 callStatic
                const result = await stakeContract.getStakeInfo(id);
                
                // ✅ 修复2：安全解析返回值（同时支持数组和对象）
                const stakeId = (result.id || result[0]).toString();
                const user = result.user || result[1];
                const tokenType = result.tokenType !== undefined ? result.tokenType : result[2];
                const amount = result.amount || result[3];
                const startTime = (result.startTime || result[4]).toString();
                const period = result.period !== undefined ? result.period : result[5];
                const redeemed = result.redeemed !== undefined ? result.redeemed : result[6];
                const lastClaimTime = (result.lastClaimTime || result[7]).toString();
                const accumulatedClaimed = result.accumulatedClaimed || result[8];

                // ✅ 修复3：单独获取待领取利息，失败时显示友好提示
                let pendingDisplay = '计算中...';
                let pendingValue = 0;
                try {
                    const pending = await stakeContract.getPendingInterest(id);
                    pendingValue = pending ? parseFloat(ethers.utils.formatUnits(pending, 18)) : 0;
                    pendingDisplay = pendingValue > 0 ? pendingValue.toFixed(4) + ' BCBS' : '0.0000 BCBS';
                } catch (pendingErr) {
                    console.warn(`⚠️ 订单 #${stakeId} 利息计算失败:`, pendingErr.message);
                    // ✅ 降级处理：显示提示但不阻断其他数据
                    pendingDisplay = '⚠️ 暂不可用';
                }

                const tokenName = tokenType === 0 ? 'AIGC' : 'USDT';
                let decimals = 18;
                try {
                    const contract = tokenType === 0 ? aigcContract : usdtContract;
                    decimals = await getDecimals(contract);
                } catch (decErr) {
                    console.warn('获取精度失败，默认18:', decErr.message);
                }

                const periodInfo = getPeriodName(Number(period));
                const dailyRate = getDailyRate(Number(period));
                const endTime = parseInt(startTime) + periodDays[Number(period)] * cachedDaySeconds;
                const status = getStatusLabel(redeemed, endTime);

                return `
                    <div class="stake-card" data-stake-id="${stakeId}">
                        <div class="stake-header">
                            <span class="stake-id"># ${stakeId}</span>
                            <span class="stake-status ${status.cls}">${status.text}</span>
                        </div>
                        <div class="info-row"><span class="label">质押资产</span><span class="value">${tokenName}</span></div>
                        <div class="info-row"><span class="label">质押数量</span><span class="value">${formatTokenAmount(amount, decimals)} ${tokenName}</span></div>
                        <div class="info-row"><span class="label">质押时间</span><span class="value">${formatTimestamp(startTime)}</span></div>
                        <div class="info-row"><span class="label">到期时间</span><span class="value">${formatTimestamp(endTime)}</span></div>
                        <div class="info-row"><span class="label">剩余时间</span><span class="value countdown" data-end-time="${endTime}">${formatRemainingTime(endTime)}</span></div>
                        <div class="info-row"><span class="label">周期</span><span class="value">${periodInfo.name}${cachedDaySeconds !== 86400 ? ' (测试版 ' + periodInfo.test + ')' : ''}</span></div>
                        <div class="info-row"><span class="label">日利率</span><span class="value rate">${dailyRate}</span></div>
                        <div class="stake-interest">
                            <div class="info-row"><span class="label">已领取利息</span><span class="value">${formatTokenAmount(accumulatedClaimed)} BCBS</span></div>
                            <div class="info-row"><span class="label">待领取利息</span><span class="value pending-interest">${pendingDisplay}</span></div>
                        </div>
                        <div class="stake-actions">
                            <button class="btn btn-primary" data-id="${stakeId}" data-action="claim" ${redeemed || pendingValue <= 0 ? 'disabled' : ''}>
                                💰 领取利息
                            </button>
                            ${status.text.includes('可赎回') ? 
                                `<button class="btn btn-success" data-id="${stakeId}" data-action="redeem">🔓 赎回本金</button>` : 
                                `<button class="btn btn-danger" data-id="${stakeId}" data-action="early" ${redeemed ? 'disabled' : ''}>⚠️ 提前赎回</button>`
                            }
                        </div>
                    </div>`;
            } catch (e) {
                throw e; // 重新抛出，由调用方处理
            }
        }

        // ✅ 新增：全局错误卡片
        function renderGlobalErrorCard(error) {
            return `
                <div class="stake-card">
                    <div class="stake-header">
                        <span class="stake-id">⚠️ 系统错误</span>
                        <span class="stake-status status-error">加载失败</span>
                    </div>
                    <div class="info-row">
                        <span class="label">错误类型</span>
                        <span class="value" style="color:#ff6b6b;">${error.code || 'UNKNOWN'}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">错误详情</span>
                        <span class="value" style="color:#ff6b6b;font-size:11px;word-break:break-all;">${(error.message || '未知错误').substring(0, 150)}</span>
                    </div>
                    <div class="stake-actions" style="margin-top:12px;">
                        <button class="btn btn-retry" onclick="loadOrders()">🔄 重新加载</button>
                        <button class="btn btn-retry" onclick="location.reload()">🔃 刷新页面</button>
                    </div>
                </div>`;
        }

        // ✅ 新增：单个订单错误卡片
        function renderErrorCard(id, error) {
            return `
                <div class="stake-card">
                    <div class="stake-header">
                        <span class="stake-id"># ${id.toString()}</span>
                        <span class="stake-status status-error">加载失败</span>
                    </div>
                    <div class="info-row">
                        <span class="label">错误信息</span>
                        <span class="value" style="color:#ff6b6b;font-size:11px;">${(error.message || '未知错误').substring(0, 100)}</span>
                    </div>
                    <div class="stake-actions">
                        <button class="btn btn-retry" onclick="retryLoadOrder(${id})">🔄 重试加载</button>
                    </div>
                </div>`;
        }

        // ✅ 新增：重试加载单个订单
        async function retryLoadOrder(id) {
            const card = document.querySelector(`.stake-card[data-stake-id="${id}"]`);
            if (card) {
                card.innerHTML = '<div style="text-align:center;padding:20px;color:#f90;">⏳ 加载中...</div>';
            }
            try {
                const orderHtml = await loadSingleOrder(id);
                if (card) {
                    card.outerHTML = orderHtml;
                    bindOrderActions();
                }
            } catch (e) {
                if (card) {
                    card.innerHTML = renderErrorCard(id, e);
                    bindOrderActions();
                }
            }
        }

        // ======================== 渲染辅助 ========================
        function renderEmptyCard() {
            return `
                <div class="stake-card">
                    <div class="stake-header"><span class="stake-id">📭 暂无质押</span></div>
                    <div style="text-align:center; padding:20px 0; color:#6a8aae; font-size:14px;">
                        <div style="font-size:32px; margin-bottom:8px;">🔓</div>
                        <div>还没有质押订单</div>
                        <div style="font-size:12px; margin-top:4px;">质押 AIGC 或 USDT 开始赚取利息</div>
                    </div>
                </div>`;
        }

        function renderSkeleton() {
            return `
                <div class="stake-card">
                    <div class="stake-header">
                        <div class="skeleton" style="width:40px;height:17px;"></div>
                        <div class="skeleton" style="width:70px;height:24px;border-radius:20px;"></div>
                    </div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:140px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:120px;"></div></div>
                    <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:50px;"></div></div>
                    <div class="skeleton-interest">
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value"></div></div>
                        <div class="skeleton-row"><div class="skeleton skeleton-label"></div><div class="skeleton skeleton-value" style="width:80px;"></div></div>
                    </div>
                    <div class="stake-actions">
                        <div class="skeleton skeleton-btn"></div>
                        <div class="skeleton skeleton-btn"></div>
                    </div>
                </div>`;
        }

        // ======================== 倒计时 ========================
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                document.querySelectorAll('.countdown').forEach(el => {
                    const t = parseInt(el.dataset.endTime);
                    if (t) el.textContent = formatRemainingTime(t);
                });
            }, 10000);
        }

        // ======================== 绑定操作按钮 ========================
        function bindOrderActions() {
            document.querySelectorAll('.stake-actions .btn:not(:disabled)').forEach(btn => {
                // 移除旧监听器（防止重复绑定）
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                newBtn.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    const action = this.dataset.action;
                    this.disabled = true;
                    const origText = this.textContent;
                    this.textContent = '处理中...';
                    
                    try {
                        if (action === 'claim') {
                            const pending = await stakeContract.getPendingInterest(id);
                            if (!pending || pending.eq(0)) {
                                alert('没有可领取的利息');
                                this.disabled = false;
                                this.textContent = origText;
                                return;
                            }
                            
                            let fee;
                            try {
                                fee = await stakeContract.getBnbRequiredForClaim(pending);
                            } catch (feeErr) {
                                console.warn('获取BNB费用失败，使用默认值:', feeErr.message);
                                fee = ethers.utils.parseEther('0.01'); // 降级默认值
                            }
                            
                            const tx = await stakeContract.claimInterest(id, { 
                                value: fee, 
                                gasLimit: 500000 
                            });
                            await tx.wait();
                            alert('✅ 利息领取成功！');
                        } else if (action === 'redeem') {
                            if (!confirm('确认赎回本金？')) {
                                this.disabled = false;
                                this.textContent = origText;
                                return;
                            }
                            const tx = await stakeContract.redeemPrincipal(id, { gasLimit: 500000 });
                            await tx.wait();
                            alert('✅ 本金已赎回！');
                        } else if (action === 'early') {
                            if (!confirm('⚠️ 提前赎回将扣除30%本金，确定继续？')) {
                                this.disabled = false;
                                this.textContent = origText;
                                return;
                            }
                            const tx = await stakeContract.redeemPrincipalEarly(id, { gasLimit: 500000 });
                            await tx.wait();
                            alert('⚠️ 提前赎回完成，已扣除30%惩罚金');
                        }
                        
                        await loadOrders();
                        await updateAllBalances();
                    } catch (e) {
                        console.error('操作失败:', e);
                        alert('操作失败: ' + (e.reason || e.message || '未知错误'));
                        this.disabled = false;
                        this.textContent = origText;
                    }
                });
            });
        }

        // ======================== 事件绑定 ========================
        document.getElementById('claimFaucetBtn').addEventListener('click', async () => {
            if (!currentAccount) {
                alert('请先连接钱包');
                return;
            }
            alert('💡 提示：测试币水龙头功能需要合约支持，请联系管理员获取测试币');
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCoin = this.dataset.coin;
                document.getElementById('coinLabel').textContent = currentCoin;
                document.getElementById('currencyDisplay').textContent = currentCoin;
                document.getElementById('stakeAmount').value = '0';
                updateBalance();
                updateRewardPreview();
            });
        });

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = parseInt(this.dataset.period);
                updateRewardPreview();
            });
        });

        document.getElementById('maxBtn').addEventListener('click', () => {
            document.getElementById('stakeAmount').value = document.getElementById('availableBalance').textContent;
            updateRewardPreview();
        });

        document.getElementById('stakeAmount').addEventListener('input', updateRewardPreview);

        // ======================== 质押提交 ========================
        stakeBtn.addEventListener('click', async () => {
            if (!currentAccount) {
                alert('请先连接钱包');
                return;
            }

            const amount = document.getElementById('stakeAmount').value;
            if (!amount || parseFloat(amount) <= 0) {
                alert('请输入有效的质押数量');
                return;
            }

            const tokenContract = currentCoin === 'AIGC' ? aigcContract : usdtContract;
            const decimals = await getDecimals(tokenContract);
            const amountWei = ethers.utils.parseUnits(amount, decimals);

            stakeBtn.disabled = true;
            stakeBtn.textContent = '检查授权中...';

            try {
                // ✅ 检查授权
                const allowance = await tokenContract.allowance(currentAccount, BCBS_ADDRESS);
                if (allowance.lt(amountWei)) {
                    stakeBtn.textContent = '请确认授权...';
                    // ✅ 按需授权，不使用 MaxUint256
                    const tx = await tokenContract.approve(BCBS_ADDRESS, amountWei);
                    await tx.wait();
                    stakeBtn.textContent = '正在质押...';
                }

                // ✅ 执行质押
                const stakeFunc = currentCoin === 'AIGC' ? 
                    stakeContract.stakeAIGC : 
                    stakeContract.stakeUSDT;
                
                const tx = await stakeFunc(amountWei, currentPeriod, { gasLimit: 500000 });
                await tx.wait();
                
                alert('✅ 质押成功！');
                document.getElementById('stakeAmount').value = '0';
                updateRewardPreview();
                await refreshAll();
            } catch (e) {
                console.error('质押失败:', e);
                alert('质押失败: ' + (e.reason || e.message || '未知错误'));
            } finally {
                stakeBtn.disabled = false;
                stakeBtn.textContent = '立即质押';
            }
        });

        // ======================== 钱包连接 ========================
        function updateUIForConnected(acc) {
            connectBtn.textContent = `${acc.substring(0,6)}...${acc.substring(acc.length-4)}`;
            connectBtn.classList.add('connected');
            connectBtn.onclick = disconnectWallet;
        }

        function setDisconnectedUI() {
            connectBtn.textContent = 'Connect wallet';
            connectBtn.classList.remove('connected');
            connectBtn.onclick = connectWallet;
            document.getElementById('availableBalance').textContent = '0.00';
            document.getElementById('aigcBalance').textContent = '--';
            document.getElementById('usdtBalance').textContent = '--';
            document.getElementById('orderListContainer').innerHTML = renderSkeleton();
        }

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('请安装MetaMask钱包');
                return;
            }
            try {
                showLoading();
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                initContracts();
                await fetchChainParams(); // ✅ 获取链上参数
                updateUIForConnected(currentAccount);
                await refreshAll();
            } catch (e) {
                console.error('连接失败:', e);
                alert('连接失败: ' + e.message);
            } finally {
                hideLoading();
            }
        }

        function disconnectWallet() {
            currentAccount = null;
            signer = null;
            provider = null;
            setDisconnectedUI();
            if (countdownTimer) clearInterval(countdownTimer);
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length === 0) {
                disconnectWallet();
            } else {
                currentAccount = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                initContracts();
                updateUIForConnected(currentAccount);
                refreshAll();
            }
        }

        async function autoConnect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ 
                        method: 'eth_accounts' // ✅ 静默获取，不弹窗
                    });
                    
                    if (accounts.length > 0) {
                        currentAccount = accounts[0];
                        provider = new ethers.providers.Web3Provider(window.ethereum);
                        signer = provider.getSigner();
                        initContracts();
                        await fetchChainParams();
                        updateUIForConnected(currentAccount);
                        await refreshAll();
                    } else {
                        setDisconnectedUI();
                    }
                    
                    // ✅ 避免重复绑定事件
                    window.ethereum.removeListener('accountsChanged', handleAccountsChanged);
                    window.ethereum.on('accountsChanged', handleAccountsChanged);
                    window.ethereum.removeListener('chainChanged', () => window.location.reload());
                    window.ethereum.on('chainChanged', () => window.location.reload());
                } catch (error) {
                    console.warn('自动连接失败:', error.message);
                    setDisconnectedUI();
                }
            } else {
                connectBtn.textContent = 'No Wallet';
                connectBtn.disabled = true;
            }
        }

        // ======================== 全局函数暴露 ========================
        window.loadOrders = loadOrders;
        window.retryLoadOrder = retryLoadOrder;

        // ======================== 启动 ========================
        window.addEventListener('load', () => {
            autoConnect();
        });

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', () => {
            if (countdownTimer) clearInterval(countdownTimer);
        });
    </script>
</body>
</html>
