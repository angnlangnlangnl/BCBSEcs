<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流动性 - BCBS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* ================= 纯科技蓝赛博风主题色 ================= */
        :root {
            --bg-color: #050B15;             /* 极深星空蓝背景 */
            --card-bg: rgba(8, 20, 48, 0.4); /* 半透明深蓝卡片 */
            --border-color: rgba(0, 136, 255, 0.15); /* 幽蓝边框 */
            
            --text-primary: #FFFFFF;         /* 纯白主文本 */
            --text-primary-soft: #E2F0FB;    /* 极浅冰白 */
            --text-secondary: #8AA9C9;       /* 低饱和灰蓝 */
            --text-dim: rgba(255, 255, 255, 0.45); /* 半透明白 */
            
            --cyan-glow: #00DDFF;            /* 电光青/亮蓝（核心高亮） */
            --cyan-dim: #0088FF;             /* 深蓝/暗光蓝 */
            --cyan-deep: #0A2463;            /* 深钴蓝 */
        }

        body { 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            overflow: hidden; 
            color: var(--text-primary); 
        }

        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            background: radial-gradient(circle at 50% 10%, #102040 0%, #050B15 100%); 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0, 136, 255, 0.1); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
        }
        
        /* 背景图适配：保证向下渐变融合，不割裂 */
        .app-container::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-image: url('https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/bg.png'); 
            background-size: cover; 
            background-position: center top; 
            background-repeat: no-repeat; 
            /* 增加底部渐变遮罩，让背景图自然融入深空蓝 */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
            opacity: 0.8;
            z-index: 0; 
            pointer-events: none; 
            border-radius: 20px; 
        }

        .scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            -webkit-overflow-scrolling: touch; 
            position: relative; 
            z-index: 1; 
        }

        /* ================= Header ================= */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo-area { display: flex; align-items: center; font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.5px; }
        .logo-area img { width: 24px; height: 24px; margin-right: 5px; }
        .logo-area span { margin-left: 5px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        
        .lang-btn { background: transparent; border: 1px solid rgba(0, 136, 255, 0.2); color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        
        .connect-btn { 
            background: transparent; 
            border: 1px solid rgba(0, 221, 255, 0.3); 
            color: var(--cyan-glow); 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 500; 
            cursor: pointer; 
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.05); 
            transition: all 0.3s; 
            white-space: nowrap; 
        }
        .connect-btn:hover:not(:disabled) { box-shadow: 0 0 25px rgba(0, 204, 255, 0.2); background: rgba(0, 204, 255, 0.05); }
        .connect-btn.connected { background: rgba(0, 204, 255, 0.1); border-color: var(--cyan-glow); color: var(--cyan-glow); }
        .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ================= 面板基础样式 ================= */
        .panel { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
            position: relative; 
        }
        /* 科技蓝流光边框效果 */
        .panel::before { 
            content: ''; 
            position: absolute; 
            top: -1px; left: -1px; right: -1px; bottom: -1px; 
            border-radius: 16px; 
            padding: 1px; 
            background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--cyan-glow)); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; 
            mask-composite: exclude; 
            pointer-events: none; 
            opacity: 0.5;
        }

        /* ================= 标题 ================= */
        .page-title { 
            font-size: 24px; 
            color: var(--text-primary); 
            text-align: center; 
            margin: 10px 0 20px; 
            font-weight: 600;
        }

        /* ================= 按钮 ================= */
        .btn-primary { 
            width: 100%; 
            background: linear-gradient(90deg, var(--cyan-dim), var(--cyan-glow)); 
            border: none; 
            border-radius: 8px; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            color: #050B15; 
            cursor: pointer; 
            box-shadow: 0 6px 20px rgba(0, 136, 255, 0.3); 
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 204, 255, 0.5); }

        /* ================= 底部导航栏 ================= */
        .bottom-nav { 
            flex-shrink: 0; 
            background: rgba(5, 11, 21, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 136, 255, 0.15); 
            border-radius: 20px; 
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.8); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            margin: 0 15px 15px 15px; 
            position: relative; 
            z-index: 10;
        }
        .bottom-nav::before { 
            content: ''; 
            position: absolute; 
            top: -1px; left: -1px; right: -1px; bottom: -1px; 
            border-radius: 20px; 
            padding: 1px; 
            background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--cyan-glow)); 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); 
            -webkit-mask-composite: xor; 
            mask-composite: exclude; 
            pointer-events: none; 
            opacity: 0.5;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--text-secondary); font-size: 11px; gap: 4px; cursor: pointer; padding: 5px 10px; 
            transition: all 0.3s ease; text-decoration: none; 
        }
        .nav-item .nav-icon { width: 20px; height: 20px; object-fit: contain; }
        .nav-item.active { color: var(--text-primary); position: relative; }
        .nav-item.active::after { 
            content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); 
            width: 20px; height: 2px; 
            background: linear-gradient(to right, var(--cyan-dim), var(--cyan-glow)); 
            border-radius: 5px; box-shadow: 0 0 15px var(--cyan-glow); 
        }
        .nav-item:not(.active):hover { color: var(--cyan-glow); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="scroll-area">
            <div class="header">
                <div class="logo-area"><img src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/aigc.png" alt="AIGC"><span>BCBS</span></div>
                <div class="header-controls"><button class="lang-btn">🇺🇸 EN ⌄</button><button id="connectWalletBtn" class="connect-btn">Connect wallet</button></div>
            </div>
            <div class="page-title">💧 流动性</div>
            
            <div class="panel">
                <div style="color:var(--text-primary);font-size:14px;font-weight:600;margin-bottom:8px;">添加流动性</div>
                <div style="color:var(--text-secondary);font-size:12px;margin-bottom:12px;">为交易对提供流动性，赚取手续费奖励</div>
                <button class="btn-primary">添加流动性</button>
            </div>
        </div>
        
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/index.icon.png" alt="资产"><span>资产</span></a>
            <a href="stake.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/stake.icon.png" alt="质押"><span>质押</span></a>
            <a href="liquidity.html" class="nav-item active"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/liquidity.icon.png" alt="流动性"><span>流动性</span></a>
            <a href="invite.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/invite.icon.png" alt="邀请"><span>邀请</span></a>
            <a href="ecosystem.html" class="nav-item"><img class="nav-icon" src="https://raw.githubusercontent.com/angnlangnlangnl/BCBSEcs/main/images/ecosystem.icon.png" alt="生态"><span>生态</span></a>
        </div>
    </div>
    
    <script>
        const AIGC_ADDRESS = '0xdB5A187FE04A249AC2F2E821b72b771d01b2C0e8';
        const BCBS_ADDRESS = '0x9ECcC2B06582Ca14509CAd41F1d5204979Ce6995';
        const HSBC_ADDRESS = '0x20aD84A60902A91F036bD6bdB85AD1d61B2f65C1';
        let provider, signer, currentAccount;
        const connectBtn = document.getElementById('connectWalletBtn');
        
        function updateUIForConnected(acc){ 
            connectBtn.textContent=`${acc.substring(0,6)}...${acc.substring(acc.length-4)}`; 
            connectBtn.classList.add('connected'); 
            connectBtn.onclick=disconnectWallet; 
        }
        function setDisconnectedUI(){ 
            connectBtn.textContent='Connect wallet'; 
            connectBtn.classList.remove('connected'); 
            connectBtn.onclick=connectWallet; 
        }
        async function connectWallet(){ 
            if(typeof window.ethereum==='undefined'){ alert('请安装MetaMask'); return; } 
            const accounts=await window.ethereum.request({method:'eth_requestAccounts'}); 
            currentAccount=accounts[0]; 
            provider=new ethers.providers.Web3Provider(window.ethereum); 
            signer=provider.getSigner(); 
            updateUIForConnected(currentAccount); 
        }
        function disconnectWallet(){ 
            currentAccount=null; 
            signer=null; 
            setDisconnectedUI(); 
        }
        function handleAccountsChanged(accounts){ 
            if(accounts.length===0)disconnectWallet(); 
            else{ currentAccount=accounts[0]; provider=new ethers.providers.Web3Provider(window.ethereum); signer=provider.getSigner(); updateUIForConnected(currentAccount); } 
        }
        async function autoConnect(){ 
            if(typeof window.ethereum!=='undefined'){ 
                provider=new ethers.providers.Web3Provider(window.ethereum); 
                try{ 
                    const accounts=await provider.listAccounts(); 
                    if(accounts.length>0){ 
                        currentAccount=accounts[0]; 
                        signer=provider.getSigner(); 
                        updateUIForConnected(currentAccount); 
                    }else setDisconnectedUI(); 
                }catch(e){ setDisconnectedUI(); } 
                window.ethereum.on('accountsChanged',handleAccountsChanged); 
                window.ethereum.on('chainChanged',()=>window.location.reload()); 
            } 
        }
        window.addEventListener('load',autoConnect);
    </script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" onload="autoConnect"></script>
</body>
</html>
